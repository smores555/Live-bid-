<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airline Cascading Bid System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pilot Vacancy Bid Results</h1>
            <p>Cascading seniority engine with BPL restrictions.</p>
            <button id="runBidBtn" class="primary-btn">Run Bid Simulation</button>
        </header>

        <main>
            <div id="loading" class="hidden">Running simulation, please wait...</div>
            
            <table id="resultsTable" class="hidden">
                <thead>
                    <tr>
                        <th>Seniority</th>
                        <th>Name</th>
                        <th>Previous Base/Seat</th>
                        <th>Awarded Base/Seat</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    </tbody>
            </table>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
