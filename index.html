<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>737 Master Bid Ledger</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #ffd33d; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .cap-cell { display: flex; flex-direction: column; font-size: 0.7rem; }
        .cap-cell input { background: #0d1117; border: 1px solid var(--border); color: #4ade80; padding: 5px; border-radius: 4px; font-weight: bold; margin-top: 4px; }
        
        .toolbar { display: flex; align-items: center; gap: 10px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-export { background: #30363d; border: 1px solid #444; }

        .dash-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .dash-box { background: #1a1d23; border: 1px solid var(--border); padding: 15px; border-radius: 8px; height: 250px; overflow-y: auto; }
        .audit-log { background: #0d1117; border: 1px solid var(--accent); border-radius: 8px; padding: 15px; font-family: monospace; font-size: 0.75rem; height: 200px; overflow-y: auto; margin-bottom: 20px; white-space: pre-wrap; color: #8b949e; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); }
        th { background: #21262d; color: var(--accent); text-align: left; padding: 12px; font-size: 0.8rem; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: top; }
        
        .displaced-tag { background: var(--yellow); color: #0b0e14; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; margin-left: 10px; }
        .pref-box { font-size: 0.75rem; margin-top: 8px; color: #8b949e; border-top: 1px dashed #333; padding-top: 5px; }
        .status-Awarded { color: var(--green); font-weight: bold; }
        .status-Denied { color: var(--red); }
        .status-Current { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin:0">737 Fleet Position Deltas</h3>
        <div id="capGrid" class="cap-grid">Syncing files...</div>
    </div>

    <div class="dash-container">
        <div class="dash-box">
            <h4 style="color:var(--yellow); margin:0 0 10px 0;">⚡ Displacements & Sweeps</h4>
            <div id="displacedList" style="font-size: 0.8rem;">Ready to run...</div>
        </div>
        <div class="dash-box">
            <h4 style="color:var(--accent); margin:0 0 10px 0;">📊 Vacancy Summary</h4>
            <div id="vacancySummary" style="font-size: 0.8rem;">Waiting for bid...</div>
        </div>
    </div>

    <div class="toolbar">
        <button id="runBtn" class="btn" onclick="runBid()">RUN MASTER BID</button>
        <button id="expBase" class="btn btn-export" onclick="exportBase()">CSV: BASE LIST</button>
        <button id="expTrans" class="btn btn-export" onclick="exportTrans()">CSV: TRANS LOG</button>
        <div style="flex-grow:1"></div>
        <div id="load-status" style="font-weight:bold; font-size:0.8rem;"></div>
    </div>

    <div id="auditLog" class="audit-log">Transaction ledger will generate here...</div>

    <table>
        <thead>
            <tr><th>Sen #</th><th>Pilot & Preference Audit</th><th>Original</th><th>Awarded</th><th>Status</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="engine.js"></script>
</body>
</html>
