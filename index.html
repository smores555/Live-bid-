<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>737 Master Bid - Vacancy & Backfill Mode</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #ffd33d; --purple: #bc8cff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 10px; }
        .cap-cell { background: #0d1117; padding: 10px; border-radius: 6px; border: 1px solid var(--border); }
        .cap-cell label { font-size: 0.7rem; color: var(--accent); display: block; margin-bottom: 5px; }
        .cap-cell input { background: #161b22; border: 1px solid var(--border); color: #4ade80; width: 50px; padding: 4px; border-radius: 4px; font-weight: bold; }
        .dash-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .dash-box { background: #1a1d23; border: 1px solid var(--border); padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; }
        .audit-step { display: block; font-size: 0.72rem; border-bottom: 1px solid #30363d; padding: 2px 0; }
        .denied { color: var(--red); }
        .awarded { color: var(--green); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); }
        th { background: #21262d; text-align: left; padding: 12px; font-size: 0.8rem; color: var(--accent); }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; margin-left: 5px; text-transform: uppercase; display: inline-block; }
        .tag-red { background: var(--red); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin:0">Position Capacities & Deltas</h3>
        <div id="capGrid" class="cap-grid">Loading Files...</div>
    </div>

    <div class="dash-container">
        <div class="dash-box"><h4 style="color:var(--red)">🛑 Self-Displaced (BPL)</h4><div id="selfDispList"></div></div>
        <div class="dash-box"><h4 style="color:var(--yellow)">🚚 Movers</h4><div id="moversList"></div></div>
        <div class="dash-box"><h4 style="color:var(--purple)">🆘 Pool (Reductions)</h4><div id="unassignedList"></div></div>
        <div class="dash-box"><h4 style="color:var(--accent)">⚙️ Engine Status</h4><div id="statusBox">Ready.</div></div>
    </div>

    <div style="margin-bottom:20px;">
        <button id="runBtn" style="background:var(--green); color:white; padding:12px 30px; font-weight:bold; border:none; border-radius:6px; cursor:pointer;">RUN VACANCY BID</button>
        <button id="expMaster" style="padding:10px; margin-left:10px; cursor:pointer;">CSV: MASTER</button>
        <button id="expLog" style="padding:10px; margin-left:10px; cursor:pointer;">CSV: LOG</button>
    </div>

    <table>
        <thead>
            <tr><th>Sen #</th><th>Name</th><th>Award</th><th>Standing</th><th>Audit Path</th><th>Original</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
let store = { roster: [], prefs: {}, caps: [], retired: [], noBid: [] };

// Flexible loader for files with (2) in the name
async function loadFiles() {
    const fetchF = async (n) => {
        try { let r = await fetch(n); if (r.ok) return await r.json(); } catch(e) {}
        try { let r = await fetch(n.replace('.json', ' (2).json')); if (r.ok) return await r.json(); } catch(e) {}
        return null;
    };
    store.roster = await fetchF('roster.json');
    store.prefs = await fetchF('preferences.json');
    store.caps = await fetchF('capacities.json');
    store.retired = await fetchF('retired_pilots.json');
    store.noBid = await fetchF('nobidpilots.json');
    if (store.caps) renderCapacities();
}

window.onload = loadFiles;

function renderCapacities() {
    document.getElementById('capGrid').innerHTML = store.caps.map(c => `
        <div class="cap-cell">
            <label>${c.base} ${c.seat}</label>
            <input type="number" id="delta-${c.base}-${c.seat}" value="0">
            <span style="font-size:0.65rem; color:#8b949e; margin-left:5px;">Cap: ${c.startCapacity}</span>
        </div>`).join('');
}

function runBidEngine(data, deltaMap) {
    const is737 = (s) => s && !s.includes('320') && !s.includes('321');
    let targetMap = {};
    let awardedCount = {};
    let origRemaining = {};

    // 1. Initial Count: How many pilots start in each seat?
    data.roster.forEach(p => {
        if (is737(p.current.seat)) {
            const key = `${p.current.base}-${p.current.seat}`.toUpperCase();
            origRemaining[key] = (origRemaining[key] || 0) + 1;
        }
    });

    // 2. Set Hard Caps
    data.caps.forEach(c => {
        const key = `${c.base}-${c.seat}`.toUpperCase();
        targetMap[key] = c.startCapacity + (deltaMap[key] || 0);
        awardedCount[key] = 0;
    });

    const getTargetKey = (s) => {
        if (!s || s === "0") return null;
        const pts = s.trim().toUpperCase().split(/\s+/);
        const b = pts.find(x => ['SEA','PDX','ANC','SFO','LAX','SAN','LAS'].includes(x));
        const st = pts.find(x => ['CA','FO'].includes(x));
        return (b && st) ? `${b}-${st}` : null;
    };

    const retiredSens = new Set(data.retired.filter(p => is737(p.seat)).map(p => p.seniority));
    const noBidSens = new Set(data.noBid.filter(p => is737(p.seat)).map(p => p.sen));

    const bidders = data.roster
        .filter(p => is737(p.current.seat) && !retiredSens.has(p.sen) && !noBidSens.has(p.sen))
        .map(p => {
            const pilotOrig = `${p.current.base}-${p.current.seat}`.toUpperCase();
            let f = data.prefs['pil' + p.sen] || data.prefs[p.id] || data.prefs[p.sen];
            let pd = f ? (f.preferences || f.bids || []) : [];
            const cleanPrefs = pd.map(pr => ({
                targetKey: getTargetKey(pr.bid || pr.position),
                bpl: parseInt(pr.bpl_min || pr.bpl || 0),
                order: pr.order
            })).filter(pr => pr.targetKey);
            const bplOnOwn = cleanPrefs.some(pr => pr.targetKey === pilotOrig && pr.bpl > 0);
            return { ...p, orig: pilotOrig, currentKey: "UNASSIGNED", awardAudit: [], bplOnOwn, prefs: cleanPrefs };
        }).sort((a, b) => a.sen - b.sen);

    bidders.forEach(p => {
        let awarded = false;

        // THE VACANCY FIX: As this pilot is evaluated, they "stand up". 
        // This makes their chair available for anyone behind them.
        if (origRemaining[p.orig] > 0) origRemaining[p.orig]--;

        // STEP 1: PREFERENCES
        for (const pr of p.prefs) {
            // A seat is vacant if: (Awarded so far) + (Originals still seated) < Hard Cap
            let currentlySeated = (awardedCount[pr.targetKey] || 0) + (origRemaining[pr.targetKey] || 0);
            let cap = targetMap[pr.targetKey] || 0;
            let bpl = pr.bpl > 0 ? pr.bpl : 9999;
            
            // Your rank for BPL is strictly the awarded count + 1
            let bplRank = awardedCount[pr.targetKey] + 1;

            if (currentlySeated < cap && bplRank <= bpl) {
                p.currentKey = pr.targetKey;
                awardedCount[pr.targetKey]++;
                p.awardAudit.push(`<span class="awarded">Awarded ${pr.targetKey}</span> (BPL Rank ${bplRank})`);
                awarded = true; break;
            } else {
                let reason = currentlySeated >= cap ? "Full" : "BPL Fail";
                p.awardAudit.push(`${pr.order}) ${pr.targetKey}: <span class="denied">${reason}</span>`);
            }
        }

        // STEP 2: SENIORITY HOLD (Only if no BPL on own seat)
        if (!awarded && !p.bplOnOwn) {
            let currentlySeated = (awardedCount[p.orig] || 0) + (origRemaining[p.orig] || 0);
            if (currentlySeated < (targetMap[p.orig] || 0)) {
                p.currentKey = p.orig;
                awardedCount[p.orig]++;
                p.awardAudit.push(`<span class="awarded">Seniority Hold</span>`);
                awarded = true;
            }
        }

        if (!awarded) {
            p.currentKey = "UNASSIGNED";
            p.awardAudit.push(`<span class="denied">POOL</span>`);
        }
    });
    return { roster: bidders, targetMap };
}

document.getElementById('runBtn').onclick = () => {
    let deltas = {};
    store.caps.forEach(c => {
        const key = `${c.base}-${c.seat}`.toUpperCase();
        deltas[key] = parseInt(document.getElementById(`delta-${c.base}-${c.seat}`).value) || 0;
    });
    const result = runBidEngine(store, deltas);
    renderTable(result.roster, result.targetMap);
    renderDashboards(result.roster);
};

function renderTable(roster, targetMap) {
    document.getElementById('tableBody').innerHTML = roster.map(p => {
        let finalRank = 1;
        roster.forEach(other => { if (other.sen < p.sen && other.currentKey === p.currentKey) finalRank++; });
        const isMover = p.currentKey !== p.orig && p.currentKey !== "UNASSIGNED";
        const isSelfDisp = p.bplOnOwn && p.currentKey === "UNASSIGNED";
        return `<tr>
            <td>${p.sen}</td>
            <td><strong>${p.name}</strong>${isSelfDisp?' <span class="tag tag-red">BPL DISPLACED</span>':''}</td>
            <td style="color:${isMover?'#3fb950':''}">${p.currentKey}</td>
            <td><span class="rank-badge">${p.currentKey === "UNASSIGNED" ? "-" : finalRank + " / " + (targetMap[p.currentKey]||0)}</span></td>
            <td>${p.awardAudit.map(a => `<span class="audit-step">${a}</span>`).join('')}</td>
            <td>${p.orig}</td>
        </tr>`;
    }).join('');
}

function renderDashboards(roster) {
    let un = '', sd = '', mv = '';
    roster.forEach(p => {
        const item = `<div>#${p.sen} ${p.name}</div>`;
        if (p.bplOnOwn && p.currentKey === "UNASSIGNED") sd += item;
        else if (p.currentKey === "UNASSIGNED") un += item;
        if (p.currentKey !== p.orig && p.currentKey !== "UNASSIGNED") mv += item;
    });
    document.getElementById('selfDispList').innerHTML = sd || "None";
    document.getElementById('moversList').innerHTML = mv || "None";
    document.getElementById('unassignedList').innerHTML = un || "None";
}
</script>
</body>
</html>
