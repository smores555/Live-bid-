<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>737 Master Bid Control & Export</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #ffd33d; --purple: #bc8cff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 10px; }
        .cap-cell { display: flex; flex-direction: column; font-size: 0.65rem; }
        .cap-cell input { background: #0d1117; border: 1px solid var(--border); color: #4ade80; padding: 5px; border-radius: 4px; font-weight: bold; }
        
        .toolbar { display: flex; align-items: center; gap: 10px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .btn-export { background: #30363d; border: 1px solid #444; }

        .dash-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .dash-box { background: #1a1d23; border: 1px solid var(--border); padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; }
        .dash-title { margin: 0 0 10px 0; font-size: 0.85rem; font-weight: bold; }
        .displaced-item { background: #2a2512; border-left: 4px solid var(--yellow); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; color: #eee; }
        .unassigned-item { background: #1b122a; border-left: 4px solid var(--purple); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; color: #eee; }

        .audit-log { background: #0d1117; border: 1px solid var(--accent); border-radius: 8px; padding: 15px; font-family: monospace; font-size: 0.75rem; max-height: 200px; overflow-y: auto; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #21262d; color: var(--accent); text-align: left; padding: 12px; font-size: 0.8rem; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: top; }
        
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; margin-left: 10px; text-transform: uppercase; }
        .displaced-tag { background: var(--yellow); color: #0b0e14; }
        .unassigned-tag { background: var(--purple); color: white; }

        .rank-badge { background: #30363d; padding: 3px 7px; border-radius: 4px; color: #4ade80; font-family: 'Courier New', monospace; font-weight: bold; font-size: 0.85rem; border: 1px solid #444; }
        .award-detail { font-weight: bold; color: var(--green); font-size: 0.75rem; display: block; }
        .award-reason { color: #8b949e; font-size: 0.7rem; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin:0">Position Deltas (737 Fleet)</h3>
        <div id="capGrid" class="cap-grid">Loading Components...</div>
    </div>

    <div class="dash-container">
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--yellow)">⚡ Displaced Pilots</h4>
            <div id="displacedList">Ready to run...</div>
        </div>
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--purple)">🆘 At Mercy (Unassigned)</h4>
            <div id="unassignedList">Ready to run...</div>
        </div>
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--accent)">⚙️ Engine Status</h4>
            <div id="mismatchList">System Idle.</div>
        </div>
    </div>

    <div class="toolbar">
        <button id="runBtn" class="btn">RUN MASTER POSITION BID</button>
        <div style="width: 2px; height: 30px; background: #333; margin: 0 10px;"></div>
        <button id="expBase" class="btn btn-export">CSV: BASE LIST</button>
        <button id="expMaster" class="btn btn-export">CSV: MASTER AWARDS</button>
        <div style="flex-grow:1"></div>
        <input type="number" id="lookupInput" style="padding:10px; background:#0d1117; color:white; border:1px solid var(--border); border-radius:6px; width:120px;" placeholder="Sen #">
        <button id="lookupBtn" class="btn btn-export">LOOKUP</button>
    </div>

    <div id="auditLog" class="audit-log">Audit trail will generate here...</div>

    <table>
        <thead>
            <tr>
                <th>Sen #</th>
                <th>Pilot Name</th>
                <th>Awarded Position</th>
                <th>Final Standing (Rank / Limit)</th>
                <th>Award Path</th>
                <th>Original Position</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
/**
 * THE 737 ADMIN ENGINE - EVICTION-FIRST LOGIC
 */
function runBidEngine(data, deltaMap) {
    const auditTrail = [];
    const is737 = (seat) => seat && !seat.includes('320') && !seat.includes('321');

    const retiredSens = new Set(data.retired.filter(p => is737(p.seat)).map(p => p.seniority));
    const noBidSens = new Set(data.noBid.filter(p => is737(p.seat)).map(p => p.sen));

    let currentCounts = {};
    data.caps.forEach(c => currentCounts[`${c.base}-${c.seat}`] = 0);

    const rosterMap = new Map();
    data.roster.forEach(p => { if (!rosterMap.has(p.sen) && is737(p.current.seat)) rosterMap.set(p.sen, p); });

    const bidders = Array.from(rosterMap.values())
        .filter(p => !retiredSens.has(p.sen) && !noBidSens.has(p.sen))
        .map(p => {
            const key = `${p.current.base}-${p.current.seat}`;
            currentCounts[key] = (currentCounts[key] || 0) + 1;
            const prefData = data.prefs['pil' + p.sen] || data.prefs[p.id] || { preferences: [] };
            return {
                ...p, currentKey: key, orig: key, moved: false, wasDisplaced: false, isUnassigned: false,
                awardedPrefNum: "N/A", awardedReason: "Held Position", prefHistory: {}, 
                prefs: (prefData.preferences || []).sort((a, b) => a.order - b.order)
            };
        }).sort((a, b) => a.sen - b.sen);

    let targetMap = {};
    for (let key in currentCounts) { targetMap[key] = currentCounts[key] + (deltaMap[key] || 0); }

    let cascade = true; let loops = 0;
    while (cascade) {
        cascade = false; loops++; if (loops > 5000) break;

        for (let i = 0; i < bidders.length; i++) {
            const p = bidders[i];
            let foundAward = false;

            // STAGE 1: EVICTION CHECK
            // If the pilot is currently in a base, check if they are senior enough to stay.
            if (p.currentKey !== "UNASSIGNED") {
                let rankInCurrent = 1;
                bidders.forEach(other => { if (other.sen < p.sen && other.currentKey === p.currentKey) rankInCurrent++; });
                const currentLimit = targetMap[p.currentKey] || 0;
                
                if (rankInCurrent > currentLimit) {
                    const oldKey = p.currentKey;
                    currentCounts[oldKey]--;
                    p.currentKey = "UNASSIGNED";
                    p.wasDisplaced = true;
                    p.awardedReason = "Forced Eviction (Over Capacity)";
                    auditTrail.push({ loop: loops, sen: p.sen, name: p.name, from: oldKey, to: "UNASSIGNED", type: "Eviction" });
                    cascade = true; 
                    // No break here, we want them to immediately try their bids/sweep below
                }
            }

            // STAGE 2: PREFERENCE EVALUATION
            // Only runs if they were evicted above OR they want to move voluntarily
            for (const pr of p.prefs) {
                if (!pr.bid || pr.bid === "0") continue;
                const parts = pr.bid.trim().split(/\s+/);
                let targetKey = (parts.length === 2) ? `${parts[1]}-${parts[0]}` : `${parts[1]}-${parts[2]}`;
                
                let rankInTarget = 1; let targetOcc = 0;
                bidders.forEach(other => {
                    if (other.currentKey === targetKey) targetOcc++;
                    if (other.sen < p.sen && other.currentKey === targetKey) rankInTarget++;
                });

                const limit = targetMap[targetKey] || 0;

                // Hold Position Logic: If they are already here and rank is okay, they stay.
                if (targetKey === p.currentKey && rankInTarget <= limit) {
                    p.awardedPrefNum = pr.order; p.awardedReason = "Held Position";
                    foundAward = true; break;
                }

                if (rankInTarget > limit) continue; // Base is full for them

                // Move Logic
                if (targetOcc < limit || p.wasDisplaced) {
                    const oldKey = p.currentKey;
                    if (oldKey !== "UNASSIGNED") currentCounts[oldKey]--;
                    currentCounts[targetKey]++;
                    p.currentKey = targetKey; p.moved = true; cascade = true; foundAward = true;
                    p.awardedPrefNum = pr.order; 
                    p.awardedReason = (targetOcc < limit) ? "Vacancy Award" : "Seniority Bump";
                    auditTrail.push({ loop: loops, sen: p.sen, name: p.name, from: oldKey, to: targetKey, type: "Award" });
                    break; 
                }
            }

            // STAGE 3: VOLUNTARY HOLD
            // If they weren't evicted and didn't move, they keep their seat by default.
            if (!foundAward && p.currentKey !== "UNASSIGNED") {
                foundAward = true;
            }

            // STAGE 4: FLEET CATEGORY SWEEP
            // If they are unassigned and displaced, look for a vacant seat in their category (CA/FO).
            if (!foundAward && p.currentKey === "UNASSIGNED") {
                const currentSeatType = p.current.seat;
                for (let key in targetMap) {
                    if (key.endsWith(`-${currentSeatType}`)) {
                        let occ = bidders.filter(b => b.currentKey === key).length;
                        if (occ < targetMap[key]) {
                            p.currentKey = key; p.moved = true; cascade = true; foundAward = true;
                            p.awardedPrefNum = "Sweep"; p.awardedReason = `${currentSeatType} Category Vacancy`;
                            currentCounts[key]++;
                            auditTrail.push({ loop: loops, sen: p.sen, name: p.name, from: "UNASSIGNED", to: key, type: "Sweep" });
                            break;
                        }
                    }
                }
            }

            // STAGE 5: AT MERCY
            if (!foundAward && p.currentKey === "UNASSIGNED") {
                p.isUnassigned = true; p.awardedReason = "At Mercy of Company";
            }

            if (cascade) break; // Restart from Pilot 1 whenever a seat change occurs
        }
    }
    return { roster: bidders, loops, auditTrail };
}

/** UI CODE **/
let store = {}; let lastResults = [];
function downloadCSV(filename, rows) {
    const csvContent = rows.map(r => r.map(cell => `"${cell}"`).join(",")).join("\n");
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob); link.setAttribute("download", filename); link.click();
}

window.onload = async () => {
    try {
        const files = ['roster.json', 'preferences.json', 'capacities.json', 'retired_pilots.json', 'nobidpilots.json'];
        const results = await Promise.all(files.map(async f => { const r = await fetch(f); return await r.json(); }));
        store = { roster: results[0], prefs: results[1], caps: results[2], retired: results[3], noBid: results[4] };
        renderCapacities();
    } catch (e) { document.body.innerHTML = `<div style="padding:40px; color:red">🚨 ERROR LOADING DATA: ${e.message}</div>`; }
};

function renderCapacities() {
    document.getElementById('capGrid').innerHTML = store.caps.map(c => `<div class="cap-cell"><label>${c.base} ${c.seat}</label><input type="number" id="delta-${c.base}-${c.seat}" value="${c.delta}"></div>`).join('');
}

document.getElementById('runBtn').onclick = () => {
    const deltas = {};
    store.caps.forEach(c => deltas[`${c.base}-${c.seat}`] = parseInt(document.getElementById(`delta-${c.base}-${c.seat}`).value) || 0);
    const result = runBidEngine(store, deltas);
    lastResults = result.roster;
    document.getElementById('auditLog').innerHTML = result.auditTrail.map(a => `<div>[Pass ${a.loop}] <strong>#${a.sen} ${a.name}</strong> to <strong>${a.to}</strong></div>`).join('');
    renderTable(lastResults);
    renderDashboards(lastResults);
};

function renderDashboards(roster) {
    let dispHtml = ''; let unassignedHtml = '';
    roster.forEach(p => {
        if (p.isUnassigned) unassignedHtml += `<div class="unassigned-item">#${p.sen} ${p.name}: Assigned by Company</div>`;
        else if (p.wasDisplaced) dispHtml += `<div class="displaced-item">#${p.sen} ${p.name}: Awarded ${p.currentKey.replace('-',' ')}</div>`;
    });
    document.getElementById('displacedList').innerHTML = dispHtml || "None.";
    document.getElementById('unassignedList').innerHTML = unassignedHtml || "None.";
}

function renderTable(roster) {
    document.getElementById('tableBody').innerHTML = roster.map(p => {
        const awardedPos = p.currentKey.replace('-', ' ');
        const tag = p.isUnassigned ? '<span class="tag unassigned-tag">AT MERCY</span>' : (p.wasDisplaced ? '<span class="tag displaced-tag">DISPLACED</span>' : '');
        
        let finalRank = 1;
        roster.forEach(other => { if (other.sen < p.sen && other.currentKey === p.currentKey) finalRank++; });
        const capObj = store.caps.find(c => `${c.base}-${c.seat}` === p.currentKey);
        const limit = capObj ? (capObj.startCapacity + (parseInt(document.getElementById(`delta-${p.currentKey}`)?.value) || 0)) : "0";

        return `
            <tr>
                <td>${p.sen}</td>
                <td><strong>${p.name}</strong>${tag}</td>
                <td style="color:${p.moved?'#3fb950':''}">${awardedPos}</td>
                <td><span class="rank-badge">${finalRank} / ${limit}</span></td>
                <td>
                    <span class="award-detail">${p.awardedPrefNum === "N/A" ? "Original" : "Pref #" + p.awardedPrefNum}</span>
                    <span class="award-reason">via ${p.awardedReason}</span>
                </td>
                <td>${p.orig.replace('-',' ')}</td>
            </tr>`;
    }).join('');
}

document.getElementById('lookupBtn').onclick = () => {
    const sen = document.getElementById('lookupInput').value;
    if (sen && lastResults.length) renderTable(lastResults.filter(p => p.sen.toString() === sen));
};
</script>
</body>
</html>
