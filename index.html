<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Master Command Center | Displacement Logic</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --bg: #040c17; 
      --card: #0b192c; 
      --accent: #00e5ff; 
      --accent-hover: #33ebff;
      --text: #e8eefc; 
      --text-muted: #8ba3c7;
      --border: rgba(0, 229, 255, 0.15);
      --success: #00ffaa; 
      --danger: #ff4772; 
      --warning: #ffcf33;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
    input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #07111f; color: #fff; box-sizing: border-box; font-size: 14px; outline: none; }
    button { background: var(--accent); color: #021024; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
    button:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: auto; padding: 6px 16px; font-size: 12px; margin-top: 0; }
    .table-container { max-height: 500px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; margin-top: 15px; background: #07111f; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    th { color: var(--accent); text-transform: uppercase; font-size: 11px; position: sticky; top: 0; background: #0b192c; z-index: 10; }
    .action-pill { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; text-transform: uppercase; }
    .action-stay { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.2); }
    .action-awarded { background: rgba(0, 255, 170, 0.1); color: var(--success); border: 1px solid var(--success); }
    .action-danger { background: rgba(255, 71, 114, 0.15); color: var(--danger); border: 1px solid var(--danger); }
    .ledger-text { font-family: monospace; font-size: 12px; color: var(--warning); }
    .val-bpl-fail { color: var(--danger); }
    .val-bpl-pass { color: var(--success); }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h2 style="margin-top:0; color:var(--accent);">System Parameters & Overrides</h2>
      <div class="grid" id="modifierGrid">
        </div>
      <div style="margin-top: 20px; display: flex; gap: 15px;">
        <div style="flex: 1;">
          <label>View Specific Seniority</label>
          <input type="number" id="senInput" placeholder="Enter Seniority #">
        </div>
        <div style="flex: 1;">
          <button onclick="runAnalysis()">Run Full System Award</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Global Vacancy Summary</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Seat</th>
              <th>Pub Delta</th>
              <th>Manual Mod</th>
              <th>Target Cap</th>
              <th>Awarded</th>
              <th>Remaining</th>
              <th>Junior Sen</th>
            </tr>
          </thead>
          <tbody id="globalSummaryTable"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Displacement Ledger</h3>
        <button onclick="exportToCSV()" class="btn-secondary">Export CSV Ledger</button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Sen #</th>
              <th>Starting Seat</th>
              <th>Final Award</th>
              <th>Status</th>
              <th>BPL Activity</th>
              <th>Displacement Ledger Reason</th>
            </tr>
          </thead>
          <tbody id="competitorTable"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
let ROSTER = [], PREFS = {}, CAPACITIES = {}, NO_BID = new Set();
let fullSystemLog = []; 

const allBases = ["ANC", "LAX", "PDX", "SAN", "SEA", "SFO"];
const allSeats = ["CA", "FO"];

// Initialization: Create the modifier inputs
const grid = document.getElementById('modifierGrid');
allBases.forEach(b => {
  allSeats.forEach(s => {
    const div = document.createElement('div');
    div.innerHTML = `<label>${b} ${s} Mod</label>
                     <input type="number" id="mod_${b}_${s}" placeholder="0">`;
    grid.appendChild(div);
  });
});

function findCurrent(p) {
  if (!p || !p.current) return "";
  return `${String(p.current.base || "").trim()} ${String(p.current.seat || "").trim()}`;
}

async function loadData() {
  try {
    const [r, p, c, nb] = await Promise.all([
      fetch('./roster.json').then(res => res.json()),
      fetch('./preferences.json').then(res => res.json()),
      fetch('./capacities.json').then(res => res.json()),
      fetch('./nobidpilots.json').then(res => res.json())
    ]);
    
    ROSTER = Array.isArray(r) ? r : Object.values(r);
    PREFS = p;
    NO_BID = new Set(nb.map(x => parseInt(x.sen)));
    
    CAPACITIES = {};
    if (Array.isArray(c)) {
      c.forEach(item => {
        CAPACITIES[`${item.base} ${item.seat}`] = {
          start: item.startCapacity || 0,
          delta: item.delta || 0
        };
      });
    }
    console.log("Data loaded successfully. Frozen count:", NO_BID.size);
  } catch (e) { 
    console.error("Error loading JSON files. Check if they exist in the folder."); 
  }
}

function runAnalysis() {
  let seatLedger = {};
  
  // Initialize capacities from JSON + UI modifiers
  allBases.forEach(b => {
    allSeats.forEach(s => {
      const key = `${b} ${s}`;
      let capObj = CAPACITIES[key] || { start: 0, delta: 0 };
      const modInput = document.getElementById(`mod_${b}_${s}`);
      let modValue = modInput ? parseInt(modInput.value) || 0 : 0;
      
      seatLedger[key] = {
        pubDelta: capObj.delta,
        modApplied: modValue,
        targetCap: Math.max(0, parseInt(capObj.start) + parseInt(capObj.delta) + modValue),
        awardedCount: 0,
        juniorSen: "N/A" 
      };
    });
  });

  fullSystemLog = []; 
  const sortedRoster = [...ROSTER].sort((a, b) => parseInt(a.sen) - parseInt(b.sen));

  for (const p of sortedRoster) {
    const pSen = parseInt(p.sen);
    const startingSeat = findCurrent(p);
    
    // 1. FROZEN PILOT LOGIC (IGNORE BIDDING)
    if (NO_BID.has(pSen)) {
      let awardedSeat = startingSeat;
      if (seatLedger[awardedSeat]) {
          seatLedger[awardedSeat].awardedCount++;
          seatLedger[awardedSeat].juniorSen = pSen;
      }
      fullSystemLog.push({
        sen: pSen,
        start: startingSeat || "N/A",
        final: awardedSeat,
        status: "HELD (FROZEN)",
        bplNotes: "Bidding Frozen",
        bplExportText: "Frozen",
        ledger: "FROZEN - Pilot not permitted to bid",
        css: "action-stay"
      });
      continue;
    }

    // 2. STANDARD BIDDING LOGIC
    const pPrefObj = PREFS[`pil${pSen}`] || PREFS[pSen];
    let awardedSeat = ""; 
    let actionType = ""; 
    let ledgerReason = "";
    let wasDisplaced = false;
    let bplActivityLog = []; 
    let resolved = false;

    // Normalize preferences
    let normalizedBids = [];
    if (pPrefObj && Array.isArray(pPrefObj.preferences)) {
      pPrefObj.preferences.forEach(entry => {
        let rawBid = String(entry.bid || "").toUpperCase();
        let bMatch = allBases.find(b => rawBid.includes(b));
        let sMatch = allSeats.find(s => rawBid.includes(s));
        if (bMatch && sMatch) normalizedBids.push({ ...entry, parsedKey: `${bMatch} ${sMatch}` });
      });
    }

    // Process Bids
    for (const entry of normalizedBids) {
      const bidKey = entry.parsedKey;
      if (!seatLedger[bidKey]) continue;

      const bplVal = parseInt(entry.bpl_min || 0);
      const projectedCatSen = seatLedger[bidKey].awardedCount + 1; 

      if (bplVal > 0 && projectedCatSen > bplVal) {
        bplActivityLog.push(`<span class="val-bpl-fail">Denied ${bidKey}</span> (Limit: ${bplVal})`);
        continue; 
      }

      if (seatLedger[bidKey].targetCap > seatLedger[bidKey].awardedCount) {
        awardedSeat = bidKey;
        seatLedger[bidKey].awardedCount++;
        seatLedger[bidKey].juniorSen = pSen; 
        resolved = true;
        actionType = (bidKey === startingSeat) ? "HELD" : "MOVED";
        ledgerReason = `Awarded ${bidKey} (Spot ${seatLedger[bidKey].awardedCount} of ${seatLedger[bidKey].targetCap})`;
        break; 
      } else {
        if (bidKey === startingSeat) wasDisplaced = true;
      }
    }

    // Safety Net: If bids fail, try to hold starting seat
    if (!resolved && startingSeat !== "" && seatLedger[startingSeat]) {
       if (seatLedger[startingSeat].targetCap > seatLedger[startingSeat].awardedCount) {
          awardedSeat = startingSeat;
          seatLedger[startingSeat].awardedCount++;
          seatLedger[startingSeat].juniorSen = pSen; 
          actionType = "HELD";
          ledgerReason = "Held Starting Seat (No successful bids)";
          resolved = true;
       } else {
          wasDisplaced = true;
       }
    }

    if (!resolved) {
       awardedSeat = "UNASSIGNED";
       actionType = "LOST";
       ledgerReason = wasDisplaced ? "DISPLACED -> No Seats Available" : "No Valid Bids";
    }

    fullSystemLog.push({
      sen: pSen,
      start: startingSeat || "N/A",
      final: awardedSeat,
      status: actionType,
      bplNotes: bplActivityLog.length > 0 ? bplActivityLog.join('<br>') : "None",
      bplExportText: bplActivityLog.length > 0 ? bplActivityLog.map(str => str.replace(/<[^>]+>/g, '')).join(' | ') : "None",
      ledger: ledgerReason,
      css: actionType === "MOVED" ? "action-awarded" : (actionType === "LOST" ? "action-danger" : "action-stay")
    });
  }

  renderUI(seatLedger);
}

function renderUI(seatLedger) {
  const summaryTbody = document.getElementById("globalSummaryTable");
  let summaryHTML = "";
  allBases.forEach(b => {
    allSeats.forEach(s => {
      const key = `${b} ${s}`;
      const d = seatLedger[key];
      const remaining = d.targetCap - d.awardedCount;
      summaryHTML += `<tr>
        <td style="color:var(--accent)">${key}</td>
        <td>${d.pubDelta}</td>
        <td>${d.modApplied}</td>
        <td>${d.targetCap}</td>
        <td>${d.awardedCount}</td>
        <td style="color:${remaining > 0 ? 'var(--success)' : 'var(--danger)'}">${remaining}</td>
        <td style="color:var(--warning)">${d.juniorSen}</td>
      </tr>`;
    });
  });
  summaryTbody.innerHTML = summaryHTML;

  document.getElementById("competitorTable").innerHTML = fullSystemLog.map(c => `
    <tr>
      <td>${c.sen}</td>
      <td>${c.start}</td>
      <td><span style="color:var(--accent); font-weight:800">${c.final}</span></td>
      <td><span class="action-pill ${c.css}">${c.status}</span></td>
      <td class="bpl-text">${c.bplNotes}</td>
      <td class="ledger-text">${c.ledger}</td>
    </tr>
  `).join("");
}

function exportToCSV() {
  let csv = "Seniority,Starting Seat,Final Awarded Seat,Movement Status,BPL Details,Displacement Ledger Source\n";
  fullSystemLog.forEach(r => {
    csv += `${r.sen},${r.start},${r.final},${r.status},"${r.bplExportText}","${r.ledger}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', 'Displacement_Results.csv');
  a.click();
}

window.onload = loadData;
</script>
</body>
</html>
