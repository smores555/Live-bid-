<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Control Center</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --green: #3fb950; --red: #f85149; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; }
        .config-card { background: var(--card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .cap-cell { display: flex; flex-direction: column; font-size: 0.7rem; }
        .cap-cell label { color: var(--accent); font-weight: bold; margin-bottom: 3px; }
        .cap-cell input { background: #0d1117; border: 1px solid var(--border); color: #4ade80; padding: 5px; border-radius: 4px; font-weight: bold; }
        .toolbar { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .btn-run { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .search-input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; width: 220px; }
        .trace-box { background: #0d1117; border: 1px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-family: monospace; font-size: 0.85rem; max-height: 250px; overflow-y: auto; }
        .success { color: var(--green); border-left: 3px solid var(--green); padding-left: 8px; margin-bottom: 4px; }
        .fail { color: var(--red); border-left: 3px solid var(--red); padding-left: 8px; margin-bottom: 4px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #21262d; color: var(--accent); text-align: left; padding: 12px; font-size: 0.8rem; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .moved { color: var(--green); font-weight: bold; }
        .match { color: var(--green); }
        .mismatch { color: var(--red); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="config-card">
        <h3 style="margin:0">Position Deltas (SAN CA Vacancies: 85)</h3>
        <div id="capGrid" class="cap-grid">Loading Data...</div>
    </div>
    <div class="toolbar">
        <button id="runBtn" class="btn-run">RUN POSITION BID</button>
        <input type="number" id="trackInput" class="search-input" placeholder="Track Seniority #">
        <span id="loadInfo">Initializing...</span>
    </div>
    <div id="traceLog" class="trace-box hidden"></div>
    <table id="mainTable">
        <thead>
            <tr><th>Sen #</th><th>Pilot Name</th><th>Previous</th><th>Awarded</th><th>Status</th><th>Company Validation</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="engine.js"></script>
<script>
    let store = {};
    let answerKey = {};

    // State-Machine CSV Parser to handle names like "ORAZEM, CURTIS" correctly
    function parseCSV(text) {
        const rows = [];
        let currentRow = [];
        let field = '';
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const next = text[i+1];
            if (inQuotes) {
                if (char === '"' && next === '"') { field += '"'; i++; }
                else if (char === '"') inQuotes = false;
                else field += char;
            } else {
                if (char === '"') inQuotes = true;
                else if (char === ',') { currentRow.push(field); field = ''; }
                else if (char === '\n' || char === '\r') {
                    currentRow.push(field);
                    if (currentRow.length > 1) rows.push(currentRow);
                    currentRow = []; field = '';
                    if (char === '\r' && next === '\n') i++;
                } else field += char;
            }
        }
        if (currentRow.length > 0 || field !== '') { currentRow.push(field); rows.push(currentRow); }
        return rows;
    }

    const updateStatus = (msg, isErr = false) => {
        const el = document.getElementById('loadInfo');
        el.innerText = msg;
        el.style.color = isErr ? "#f85149" : "#58a6ff";
    };

    window.onload = async () => {
        const files = ['roster.json', 'preferences.json', 'capacities.json', 'retired_pilots.json', 'nobidpilots.json', 'answer_key.csv'];
        try {
            const results = await Promise.all(files.map(async f => {
                const r = await fetch(f);
                if (!r.ok) throw new Error(`Missing: ${f}`);
                return f.endsWith('.csv') ? r.text() : r.json();
            }));

            store = { roster: results[0], prefs: results[1], caps: results[2], retired: results[3], noBid: results[4] };
            
            // Map Answer Key by Seniority (Index 1) and Awarded Position (Index 5)
            const rows = parseCSV(results[5]);
            let keysFound = 0;
            rows.forEach((cols, idx) => {
                if (idx === 0) return; // Header
                if (cols.length >= 6) {
                    const sen = cols[1].trim(); 
                    const award = cols[5].trim(); 
                    if (sen) {
                        answerKey[sen] = award;
                        keysFound++;
                    }
                }
            });

            updateStatus(`System Ready (${keysFound} keys loaded).`);
            renderCapacities();
        } catch (e) { updateStatus("Load Error: " + e.message, true); }
    };

    function renderCapacities() {
        document.getElementById('capGrid').innerHTML = store.caps.map(c => `
            <div class="cap-cell">
                <label>${c.base} ${c.seat}</label>
                <input type="number" id="delta-${c.base}-${c.seat}" value="${c.delta}">
            </div>
        `).join('');
    }

    document.getElementById('runBtn').onclick = () => {
        const trackSen = parseInt(document.getElementById('trackInput').value);
        const deltas = {};
        store.caps.forEach(c => deltas[`${c.base}-${c.seat}`] = parseInt(document.getElementById(`delta-${c.base}-${c.seat}`).value));

        try {
            const result = runBidEngine(store, deltas, trackSen);
            
            const traceDiv = document.getElementById('traceLog');
            traceDiv.innerHTML = result.trace.map(t => `<div class="${t.type}">${t.msg}</div>`).join('');
            traceDiv.classList.toggle('hidden', !trackSen);

            document.getElementById('tableBody').innerHTML = result.roster.map(p => {
                const engineAward = p.currentKey.replace('-', ' ');
                const companyAward = answerKey[p.sen.toString()] || "No Key";
                const isMatch = companyAward !== "No Key" && companyAward.includes(engineAward);

                return `<tr>
                    <td>${p.sen}</td><td>${p.name}</td>
                    <td>${p.orig.replace('-', ' ')}</td>
                    <td class="${p.moved?'moved':''}">${engineAward}</td>
                    <td>${p.moved?'AWARDED':'HELD'}</td>
                    <td class="${isMatch?'match':'mismatch'}">
                        ${isMatch ? '✓ Match' : (companyAward === "No Key" ? 'No Key' : '✗ Expected: ' + companyAward)}
                    </td>
                </tr>`;
            }).join('');
            updateStatus(`Complete: ${result.loops} cascades.`);
        } catch (err) { updateStatus("Engine Error: " + err.message, true); }
    };
</script>
</body>
</html>
