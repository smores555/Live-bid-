<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid Control Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-status">
            <h2 id="statusTitle">Loading System...</h2>
            <div id="capGrid" class="cap-grid"></div>
        </div>

        <div class="controls">
            <button id="runBtn" class="btn-run">RUN POSITION BID</button>
            <input type="number" id="trackInput" placeholder="Track Seniority #">
            <span id="loadInfo" style="color: #4a9eff; margin-left: 10px;">Checking files...</span>
        </div>

        <div id="traceLog" class="trace-box hidden"></div>

        <table id="mainTable">
            <thead>
                <tr><th>Sen</th><th>Name</th><th>Original</th><th>Awarded</th><th>Status</th><th>Validation</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script src="engine.js"></script>
    <script>
        let store = {};
        let answerKey = {};

        const setStatus = (msg, error = false) => {
            const el = document.getElementById('loadInfo');
            el.innerText = msg;
            if (error) el.style.color = "#ff4d4d";
        };

        window.onload = async () => {
            // Updated to match your Repository file names (no .txt)
            const files = [
                'roster.json', 'preferences.json', 'capacities.json', 
                'retired_pilots.json', 'nobidpilots.json', 'answer_key.csv'
            ];

            try {
                const results = await Promise.all(files.map(async f => {
                    const r = await fetch(f);
                    if (!r.ok) throw new Error(`Missing: ${f}`);
                    return f.endsWith('.csv') ? r.text() : r.json();
                }));

                store = { roster: results[0], prefs: results[1], caps: results[2], retired: results[3], noBid: results[4] };
                
                // Parse Answer Key
                results[5].split('\n').forEach(line => {
                    const p = line.split(',');
                    if(p[1]) answerKey[p[1]] = p[5]?.replace(/"/g, '').trim();
                });

                setStatus("Files Loaded. Ready.");
                document.getElementById('statusTitle').innerText = "System Configuration";
                renderCapacities();
            } catch (e) {
                setStatus("CRITIAL ERROR: " + e.message, true);
                console.error(e);
            }
        };

        function renderCapacities() {
            document.getElementById('capGrid').innerHTML = store.caps.map(c => `
                <div class="cap-item">
                    <label>${c.base} ${c.seat}</label>
                    <input type="number" id="val-${c.base}-${c.seat}" value="${c.startCapacity + c.delta}">
                </div>
            `).join('');
        }

        document.getElementById('runBtn').onclick = () => {
            if (!store.roster) return setStatus("Error: No data loaded.", true);
            
            setStatus("Running Bid...");
            const trackSen = parseInt(document.getElementById('trackInput').value);
            const caps = {};
            store.caps.forEach(c => caps[`${c.base}-${c.seat}`] = parseInt(document.getElementById(`val-${c.base}-${c.seat}`).value));

            try {
                const result = runBidEngine(store, caps, trackSen);
                
                // Render Trace for iPad Debugging
                const traceDiv = document.getElementById('traceLog');
                traceDiv.innerHTML = result.trace.map(t => `<div class="${t.type}">${t.msg}</div>`).join('');
                traceDiv.classList.toggle('hidden', !trackSen);

                // Render Table
                document.getElementById('tableBody').innerHTML = result.roster.map(p => {
                    const awarded = p.currentKey.replace('-', ' ');
                    const keyAward = answerKey[p.sen] || "N/A";
                    const match = keyAward.includes(awarded);
                    return `<tr>
                        <td>${p.sen}</td><td>${p.name}</td><td>${p.orig}</td>
                        <td class="${p.moved?'moved':''}">${awarded}</td>
                        <td>${p.moved?'AWARDED':'HELD'}</td>
                        <td class="${match?'match':'mismatch'}">${match?'✓':'✗ '+keyAward}</td>
                    </tr>`;
                }).join('');
                
                setStatus(`Bid Finished: ${result.loops} cascades.`);
            } catch (err) {
                setStatus("RUN ERROR: " + err.message, true);
            }
        };
    </script>
</body>
</html>
