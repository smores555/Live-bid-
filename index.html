<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>737 Master Bid Control - Displacement Audit</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #ffd33d; --purple: #bc8cff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .cap-cell { display: flex; flex-direction: column; font-size: 0.7rem; }
        .cap-cell input { background: #0d1117; border: 1px solid var(--border); color: #4ade80; padding: 5px; border-radius: 4px; font-weight: bold; }
        .toolbar { display: flex; align-items: center; gap: 10px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .dash-container { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .dash-box { background: #1a1d23; border: 1px solid var(--border); padding: 15px; border-radius: 8px; height: 320px; overflow-y: auto; }
        .dash-title { margin: 0 0 10px 0; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        .unassigned-item { background: #1b122a; border-left: 4px solid var(--purple); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; }
        .self-disp-item { background: #2a1212; border-left: 4px solid var(--red); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; }
        .mover-item { background: #2a2612; border-left: 4px solid var(--yellow); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; }
        .vacancy-item { background: #122a1b; border-left: 4px solid var(--green); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        th { background: #21262d; color: var(--accent); text-align: left; padding: 12px; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: top; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; margin-left: 5px; text-transform: uppercase; display: inline-block; }
        .tag-red { background: var(--red); color: white; }
        .tag-yellow { background: var(--yellow); color: #000; }
        .rank-badge { background: #30363d; padding: 3px 7px; border-radius: 4px; color: #4ade80; font-weight: bold; font-size: 0.85rem; border: 1px solid #444; }
        .audit-step { display: block; font-size: 0.7rem; margin-bottom: 2px; border-bottom: 1px solid #30363d; padding-bottom: 2px; }
        .denied { color: #f85149; }
        .awarded { color: #3fb950; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin:0">Position Deltas (737 Fleet)</h3>
        <div id="capGrid" class="cap-grid">Loading...</div>
    </div>

    <div class="dash-container">
        <div class="dash-box"><h4 class="dash-title" style="color:var(--red)">🛑 Self-Displaced</h4><div id="selfDispList">Ready...</div></div>
        <div class="dash-box"><h4 class="dash-title" style="color:var(--green)">✅ SEA Vacancies</h4><div id="seaVacList">Ready...</div></div>
        <div class="dash-box"><h4 class="dash-title" style="color:var(--yellow)">🚚 Successful Movers</h4><div id="moversList">Ready...</div></div>
        <div class="dash-box"><h4 class="dash-title" style="color:var(--purple)">🆘 Pool</h4><div id="unassignedList">Ready...</div></div>
        <div class="dash-box"><h4 class="dash-title" style="color:var(--accent)">🔍 Base Roster</h4>
            <input type="text" id="baseLookup" style="width:90%; background:#0d1117; color:white; border:1px solid var(--border); margin-bottom:10px;" placeholder="e.g. PDX-FO">
            <div id="baseRosterList" style="font-size:0.7rem;">Enter base above...</div>
        </div>
    </div>

    <div class="toolbar">
        <button id="runBtn" class="btn">RUN MASTER POSITION BID</button>
        <div style="flex-grow:1"></div>
        <input type="number" id="lookupInput" style="padding:10px; background:#0d1117; color:white; border:1px solid var(--border); border-radius:6px; width:120px;" placeholder="Sen #">
        <button id="lookupBtn" class="btn">PILOT LOOKUP</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Sen #</th>
                <th>Pilot Name</th>
                <th>Awarded Position</th>
                <th>Final Standing</th>
                <th>Award Audit Trail</th>
                <th>Original Position</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
let store = { roster: [], prefs: {}, caps: [], retired: [], noBid: [] };
let lastRoster = [];

function runBidEngine(data, deltaMap) {
    const is737 = (seat) => seat && !seat.includes('320') && !seat.includes('321');
    let targetMap = {};
    data.caps.forEach(c => {
        const key = `${c.base}-${c.seat}`.toUpperCase();
        targetMap[key] = {
            total: c.startCapacity + (deltaMap[`${c.base}-${c.seat}`] || 0),
            baseCap: c.startCapacity
        };
    });

    const retiredSens = new Set(data.retired.filter(p => is737(p.seat)).map(p => p.seniority));
    const noBidSens = new Set(data.noBid.filter(p => is737(p.seat)).map(p => p.sen));
    let currentCounts = {};
    Object.keys(targetMap).forEach(k => currentCounts[k] = 0);

    const bidders = data.roster
        .filter(p => is737(p.current.seat) && !retiredSens.has(p.sen) && !noBidSens.has(p.sen))
        .map(p => {
            const prefData = data.prefs['pil' + p.sen] || data.prefs[p.id] || { preferences: [] };
            const pilotOrig = `${p.current.base}-${p.current.seat}`.toUpperCase();
            const getTargetKey = (bidStr) => {
                const parts = bidStr.trim().toUpperCase().split(/\s+/);
                const bases = ['SEA', 'PDX', 'ANC', 'SFO', 'LAX', 'SAN', 'LAS'];
                const seats = ['CA', 'FO'];
                let b = parts.find(x => bases.includes(x));
                let s = parts.find(x => seats.includes(x));
                return (b && s) ? `${b}-${s}` : null;
            };

            return {
                ...p, orig: pilotOrig, currentKey: "UNASSIGNED", awardAudit: [],
                isHappyMover: false, isVacancyAward: false,
                prefs: (prefData.preferences || []).map(pr => ({
                    ...pr, targetKey: getTargetKey(pr.bid),
                    bpl: parseInt(pr.bpl || pr.bpl_min) || 9999
                })).sort((a, b) => a.order - b.order)
            };
        }).sort((a, b) => a.sen - b.sen);

    bidders.forEach(p => {
        let awarded = false;
        for (const pr of p.prefs) {
            if (!pr.targetKey) continue;
            let rankInBase = (currentCounts[pr.targetKey] || 0) + 1;
            let capInfo = targetMap[pr.targetKey];

            if (rankInBase > capInfo.total) {
                p.awardAudit.push({ status: 'denied', msg: `Pref #${pr.order}: ${pr.targetKey} Full (Rank ${rankInBase} > Cap ${capInfo.total})` });
            } else if (rankInBase > pr.bpl) {
                p.awardAudit.push({ status: 'denied', msg: `Pref #${pr.order}: BPL Fail (${rankInBase} > ${pr.bpl})` });
            } else {
                p.currentKey = pr.targetKey;
                currentCounts[pr.targetKey]++;
                awarded = true;
                p.isHappyMover = (p.currentKey !== p.orig);
                p.isVacancyAward = (rankInBase > capInfo.baseCap) || p.isHappyMover;
                p.awardAudit.push({ status: 'awarded', msg: `${p.isHappyMover ? 'MOVE' : 'HOLD'} Awarded to ${pr.targetKey} (Pass ${rankInBase})` });
                break;
            }
        }

        if (!awarded) {
            const targetKey = p.orig;
            let capInfo = targetMap[targetKey];
            if (capInfo && currentCounts[targetKey] < capInfo.total) {
                currentCounts[targetKey]++;
                p.currentKey = targetKey;
                p.awardAudit.push({ status: 'awarded', msg: `Seniority Hold: ${targetKey} (Pass ${currentCounts[targetKey]})` });
                awarded = true;
            } else {
                p.awardAudit.push({ status: 'denied', msg: `Seniority Hold: ${targetKey} Denied (Base Full)` });
            }
        }

        if (!awarded) {
            p.currentKey = "UNASSIGNED";
            p.isUnassigned = true;
            p.awardAudit.push({ status: 'denied', msg: `POOL: Juniority Displacement` });
        }
    });
    return { roster: bidders, targetMap };
}

window.onload = async () => {
    try {
        const files = ['roster.json', 'preferences.json', 'capacities.json', 'retired_pilots.json', 'nobidpilots.json'];
        const results = await Promise.all(files.map(async f => { const r = await fetch(f); return await r.json(); }));
        store = { roster: results[0], prefs: results[1], caps: results[2], retired: results[3], noBid: results[4] };
        renderCapacities();
    } catch (e) { console.error(e); }
};

function renderCapacities() {
    document.getElementById('capGrid').innerHTML = store.caps.map(c => `
        <div class="cap-cell"><label>${c.base} ${c.seat}</label><input type="number" id="delta-${c.base}-${c.seat}" value="${c.delta}"></div>`).join('');
}

document.getElementById('runBtn').onclick = () => {
    const deltas = {};
    store.caps.forEach(c => deltas[`${c.base}-${c.seat}`] = parseInt(document.getElementById(`delta-${c.base}-${c.seat}`).value) || 0);
    const result = runBidEngine(store, deltas);
    lastRoster = result.roster;
    renderTable(result.roster, result.targetMap);
    renderDashboards(result.roster);
};

document.getElementById('baseLookup').oninput = (e) => {
    const key = e.target.value.toUpperCase().replace(' ', '-');
    const roster = lastRoster.filter(p => p.currentKey === key).sort((a,b) => a.sen - b.sen);
    document.getElementById('baseRosterList').innerHTML = roster.map(p => `<div>#${p.sen} ${p.name}</div>`).join('') || "No pilots found.";
};

function renderDashboards(roster) {
    let unHtml = ''; let sDHtml = ''; let mHtml = ''; let seaVacHtml = '';
    roster.forEach(p => {
        const item = `<div>#${p.sen} ${p.name}</div>`;
        if (p.isHappyMover) mHtml += `<div class="mover-item">${item}</div>`;
        if (p.isUnassigned) unHtml += `<div class="unassigned-item">${item}</div>`;
        if (p.isVacancyAward && p.currentKey.startsWith('SEA')) seaVacHtml += `<div class="vacancy-item">${item}</div>`;
    });
    document.getElementById('seaVacList').innerHTML = seaVacHtml || "No SEA Vacancies.";
    document.getElementById('moversList').innerHTML = mHtml || "None.";
    document.getElementById('unassignedList').innerHTML = unHtml || "None.";
}

function renderTable(roster, targetMap) {
    document.getElementById('tableBody').innerHTML = roster.map(p => {
        const auditHtml = p.awardAudit.map(step => `<span class="audit-step ${step.status}">${step.msg}</span>`).join('');
        let tags = '';
        if (p.isHappyMover) tags += '<span class="tag tag-yellow">MOVER</span>';
        if (p.isUnassigned) tags += '<span class="tag" style="background:var(--purple); color:white;">POOL</span>';
        if (p.isUnassigned && !p.isHappyMover) tags += '<span class="tag tag-yellow">DISPLACED</span>';

        let finalRank = 1;
        roster.forEach(other => { if (other.sen < p.sen && other.currentKey === p.currentKey) finalRank++; });
        const limit = targetMap[p.currentKey]?.total || 0;

        return `
            <tr>
                <td>${p.sen}</td>
                <td><strong>${p.name}</strong><br>${tags}</td>
                <td>${p.currentKey.replace('-', ' ')}</td>
                <td><span class="rank-badge">${p.isUnassigned ? "-" : finalRank + " / " + limit}</span></td>
                <td>${auditHtml}</td>
                <td>${p.orig.replace('-',' ')}</td>
            </tr>`;
    }).join('');
}
</script>
</body>
</html>
