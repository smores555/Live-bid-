<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airline Bid Control Center</title>
    <style>
        :root {
            --bg: #0f111a;
            --card: #1a1d2e;
            --text: #e6e6e6;
            --accent: #4a9eff;
            --border: #2d324d;
            --green: #4ade80;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* Header & Config Section */
        header {
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        h1 { margin-top: 0; color: var(--accent); font-weight: 300; }

        /* Capacity Grid */
        .capacity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .cap-card {
            background: #242942;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .cap-card label { display: block; font-size: 0.8rem; color: #8b92b7; margin-bottom: 5px; }
        
        .cap-inputs { display: flex; gap: 10px; align-items: center; }
        
        .cap-inputs input {
            background: #0f111a;
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 4px;
            width: 60px;
            text-align: center;
        }

        .cap-title { font-weight: bold; margin-bottom: 10px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        /* Buttons & Search */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-run { background: var(--accent); color: white; }
        .btn-export { background: #2d324d; color: white; margin-left: 5px; }
        .btn:hover { filter: brightness(1.2); }

        .search-box {
            background: #0f111a;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            width: 300px;
        }

        /* Results Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
        }

        th { background: #242942; color: var(--accent); text-align: left; padding: 15px; font-size: 0.85rem; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); }

        .moved-text { color: var(--green); font-weight: bold; }
        .hidden { display: none !important; }
        #loading { text-align: center; color: var(--accent); padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>System Configuration</h1>
        <p>Adjust vacancy deltas below before running the bid engine.</p>
        <div id="capacityContainer" class="capacity-grid">
            <p>Loading capacities from repository...</p>
        </div>
    </header>

    <div class="action-bar">
        <div>
            <button id="runBtn" class="btn btn-run">RUN POSITION BID</button>
            <button onclick="exportBPL()" class="btn btn-export">EXPORT BPLs</button>
            <button onclick="exportLogs()" class="btn btn-export">TRANS LOG</button>
        </div>
        <input type="text" id="search" class="search-box" placeholder="Search Seniority... (Press Enter)">
    </div>

    <div id="loading" class="hidden">Engine calculating cascades...</div>

    <table id="resultsTable" class="hidden">
        <thead>
            <tr>
                <th>Sen #</th>
                <th>Pilot Name</th>
                <th>Previous Position</th>
                <th>Awarded Position</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>
    let rawData = {}; 
    let finalRoster = [];
    let transLogs = [];

    // --- 1. INITIAL FETCH ---
    window.onload = async () => {
        try {
            const files = ['roster.json', 'preferences.json', 'capacities.json', 'retired_pilots.json', 'nobidpilots.json'];
            const [roster, prefs, caps, retired, noBid] = await Promise.all(
                files.map(f => fetch(f).then(res => res.json()))
            );
            
            rawData = { roster, prefs, caps, retired, noBid };
            buildCapacityUI(caps);
        } catch (err) {
            alert("Error loading repository files. Ensure you are running this from GitHub Pages.");
        }
    };

    // --- 2. BUILD UI FOR CAPACITIES ---
    function buildCapacityUI(caps) {
        const container = document.getElementById('capacityContainer');
        container.innerHTML = caps.map((c, i) => `
            <div class="cap-card">
                <div class="cap-title">${c.base} ${c.seat}</div>
                <div class="cap-inputs">
                    <div>
                        <label>Start</label>
                        <input type="number" id="start-${i}" value="${c.startCapacity}" readonly style="opacity: 0.5">
                    </div>
                    <div>
                        <label>Delta</label>
                        <input type="number" id="delta-${i}" value="${c.delta}" class="delta-input">
                    </div>
                    <div>
                        <label>Total</label>
                        <input type="number" id="total-${i}" value="${c.startCapacity + c.delta}" readonly style="color: var(--accent)">
                    </div>
                </div>
            </div>
        `).join('');

        // Update Total dynamically if user changes Delta
        document.querySelectorAll('.delta-input').forEach((input, index) => {
            input.addEventListener('input', () => {
                const start = parseInt(document.getElementById(`start-${index}`).value);
                const delta = parseInt(input.value) || 0;
                document.getElementById(`total-${index}`).value = start + delta;
            });
        });
    }

    // --- 3. SEARCH (Trigger on Enter) ---
    document.getElementById('search').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('#tbody tr');
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(val) ? '' : 'none';
            });
        }
    });

    // --- 4. ENGINE LOGIC ---
    document.getElementById('runBtn').addEventListener('click', () => {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('resultsTable').classList.add('hidden');

        // Extract UI-modified capacities
        const activeCapacities = {};
        rawData.caps.forEach((c, i) => {
            const total = parseInt(document.getElementById(`total-${i}`).value);
            activeCapacities[`${c.base}-${c.seat}`] = total;
        });

        // Small timeout so UI can show "Loading"
        setTimeout(() => {
            const result = runCascade(activeCapacities);
            finalRoster = result.roster;
            transLogs = result.logs;
            renderTable(finalRoster);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('resultsTable').classList.remove('hidden');
        }, 100);
    });

    function runCascade(capMap) {
        const retiredSens = new Set(rawData.retired.map(p => p.seniority));
        const noBidSens = new Set(rawData.noBid.map(p => p.sen));
        const logs = [];

        // Filter out non-bidding pilots and setup active state
        let pilots = rawData.roster
            .filter(p => !retiredSens.has(p.sen) && !noBidSens.has(p.sen))
            .map(p => ({
                ...p,
                original: `${p.current.base}-${p.current.seat}`,
                prefs: (rawData.prefs[p.id]?.preferences || []).sort((a,b) => a.order - b.order),
                moved: false
            }));

        pilots.sort((a, b) => a.sen - b.sen);

        let cascade = true;
        let loops = 0;

        while (cascade) {
            cascade = false;
            loops++;

            for (let i = 0; i < pilots.length; i++) {
                const pilot = pilots[i];
                const currentKey = `${pilot.current.base}-${pilot.current.seat}`;

                for (const pref of pilot.prefs) {
                    if (!pref.bid) continue;
                    const parts = pref.bid.split(" ");
                    const targetKey = `${parts[1]}-${parts[2]}`;

                    if (targetKey === currentKey) break;

                    const occupants = pilots.filter(p => `${p.current.base}-${p.current.seat}` === targetKey).length;
                    const limit = capMap[targetKey] || 0;

                    if (occupants < limit) {
                        // BPL Check
                        let rank = pilots.filter(p => `${p.current.base}-${p.current.seat}` === targetKey && p.sen < pilot.sen).length + 1;
                        if (pref.bpl_min > 0 && rank > pref.bpl_min) continue;

                        // AWARD
                        logs.push({ loop: loops, sen: pilot.sen, name: pilot.name, from: currentKey, to: targetKey });
                        pilot.current.base = parts[1];
                        pilot.current.seat = parts[2];
                        pilot.moved = true;
                        cascade = true; 
                        break;
                    }
                }
                if (cascade) break;
            }
        }
        return { roster: pilots, logs };
    }

    function renderTable(data) {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = data.map(p => `
            <tr>
                <td>${p.sen}</td>
                <td>${p.name}</td>
                <td>${p.original.replace('-', ' ')}</td>
                <td class="${p.moved ? 'moved-text' : ''}">${p.current.base} ${p.current.seat}</td>
                <td class="${p.moved ? 'moved-text' : ''}">${p.moved ? 'AWARDED' : 'HELD'}</td>
            </tr>
        `).join('');
    }

    // --- EXPORTS ---
    function exportBPL() {
        let csv = "Base,Seat,Rank,Seniority,Name\n";
        const groups = {};
        finalRoster.forEach(p => {
            const k = `${p.current.base}-${p.current.seat}`;
            if(!groups[k]) groups[k] = [];
            groups[k].push(p);
        });
        Object.keys(groups).sort().forEach(k => {
            groups[k].sort((a,b) => a.sen - b.sen).forEach((p, i) => {
                csv += `${p.current.base},${p.current.seat},${i+1},${p.sen},"${p.name}"\n`;
            });
        });
        download(csv, "BPL_Report.csv");
    }

    function exportLogs() {
        let csv = "Loop,Sen,Name,From,To\n";
        transLogs.forEach(l => csv += `${l.loop},${l.sen},"${l.name}",${l.from},${l.to}\n`);
        download(csv, "Transaction_Log.csv");
    }

    function download(csv, name) {
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
    }
</script>
</body>
</html>
