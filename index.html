<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bid Visibility Tool | 737 Analysis</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --blue: #58a6ff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            background: var(--card);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #8b949e;
        }

        input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
        }

        button {
            background: var(--green);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        th {
            background: #21262d;
            text-align: left;
            padding: 12px;
            font-size: 0.85rem;
            color: #8b949e;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            vertical-align: top;
        }

        .displaced-badge {
            background: rgba(210, 153, 34, 0.2);
            color: var(--yellow);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .mover-trail {
            margin-top: 8px;
            padding: 8px;
            background: rgba(88, 166, 255, 0.05);
            border-left: 3px solid var(--blue);
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .mover-header {
            font-weight: bold;
            color: var(--blue);
            margin-bottom: 4px;
            display: block;
        }

        .audit-entry { margin-bottom: 4px; }
        .success { color: var(--green); }
        .fail { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bid Visibility Tool <small style="font-size: 0.5em; vertical-align: middle;">v2.0 (Chain Tracker)</small></h1>
        <button onclick="executeBid()">RUN POSITION BID</button>
    </header>

    <div class="controls" id="cap-inputs">
        </div>

    <table>
        <thead>
            <tr>
                <th width="80">SEN</th>
                <th width="200">NAME</th>
                <th width="120">ORIGINAL</th>
                <th width="150">STATUS</th>
                <th width="120">AWARDED</th>
                <th>MATHEMATICAL AUDIT PATH (WHY)</th>
            </tr>
        </thead>
        <tbody id="results-body">
            <tr><td colspan="6" style="text-align:center; padding: 40px;">Load data and click Run Position Bid to view results.</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Configuration & Simulated Data
    const bases = ['SEA', 'PDX', 'ANC', 'LAX', 'SFO'];
    const seats = ['CA', 'FO'];
    
    // Create capacity inputs
    const capContainer = document.getElementById('cap-inputs');
    bases.forEach(b => {
        seats.forEach(s => {
            const key = `${b}-${s}`;
            capContainer.innerHTML += `
                <div class="control-group">
                    <label>${key} Capacity</label>
                    <input type="number" id="cap-${key}" value="20">
                </div>
            `;
        });
    });

    // Dummy Roster Data (Structure similar to your engine.js)
    const mockRoster = [
        { sen: 101, name: "JENKINS, DAYNE V", current: { base: "ANC", seat: "FO" }, prefs: [] },
        { sen: 102, name: "SENIOR MOVER, J", current: { base: "LAX", seat: "CA" }, prefs: [{ bid: "SEA CA", bpl: 9999 }] },
        { sen: 762, name: "TEEMS, PATRICK", current: { base: "SEA", seat: "CA" }, prefs: [] },
        { sen: 763, name: "KOCH, BRADLEY D", current: { base: "SEA", seat: "FO" }, prefs: [] }
    ];

    function executeBid() {
        const caps = {};
        bases.forEach(b => seats.forEach(s => {
            caps[`${b}-${s}`] = parseInt(document.getElementById(`cap-${b}-${s}`).value) || 0;
        }));

        // Reset fillers and Mover Registry
        const fillers = {};
        const moverRegistry = {};
        Object.keys(caps).forEach(k => {
            fillers[k] = 0;
            moverRegistry[k] = [];
        });

        const results = mockRoster.sort((a, b) => a.sen - b.sen).map(p => {
            let awarded = false;
            let audit = [];
            let finalAward = "UNASSIGNED";
            let statusHtml = "ACTIVE";
            const homeKey = `${p.current.base}-${p.current.seat}`;

            // 1. Process Preferences
            for (let i = 0; i < p.prefs.length; i++) {
                const target = p.prefs[i].bid;
                const bpl = p.prefs[i].bpl;
                const rank = fillers[target] + 1;
                const limit = caps[target];

                if (rank <= limit && rank <= bpl) {
                    fillers[target]++;
                    finalAward = target;
                    awarded = true;
                    statusHtml = target === homeKey ? "HELD" : "AWARDED";
                    
                    // NEW: Register if they are an in-bound mover
                    if (target !== homeKey) {
                        moverRegistry[target].push({
                            sen: p.sen,
                            name: p.name,
                            from: homeKey
                        });
                        audit.push(`<span class="success">Awarded Preference: ${target}</span>`);
                    }
                    break;
                } else {
                    audit.push(`Skipped ${target}: Rank ${rank} > ${limit}`);
                }
            }

            // 2. Process Seniority Hold
            if (!awarded) {
                const rank = fillers[homeKey] + 1;
                const limit = caps[homeKey];

                if (rank <= limit) {
                    fillers[homeKey]++;
                    finalAward = homeKey;
                    statusHtml = "HELD";
                    audit.push(`<span class="success">Held Original Seat (Pass ${rank}/${limit})</span>`);
                } else {
                    // DISPLACEMENT CHAIN LOGIC
                    statusHtml = '<span class="displaced-badge">Displaced</span>';
                    audit.push(`<span class="fail">${homeKey} DENIED: Base Full</span>`);
                    audit.push(`Threshold reached: ${rank} > ${limit}`);
                    
                    // Pull the names of movers who occupied the slots
                    const movers = moverRegistry[homeKey] || [];
                    if (movers.length > 0) {
                        let moverHtml = `<div class="mover-trail">
                            <span class="mover-header">Senior In-Bound Movers (Pushed You Out):</span>`;
                        movers.forEach(m => {
                            moverHtml += `• #${m.sen} ${m.name} (from ${m.from})<br>`;
                        });
                        moverHtml += `</div>`;
                        audit.push(moverHtml);
                    }
                }
            }

            return { ...p, finalAward, statusHtml, audit: audit.join('<br>') };
        });

        render(results);
    }

    function render(data) {
        const body = document.getElementById('results-body');
        body.innerHTML = data.map(p => `
            <tr>
                <td>${p.sen}</td>
                <td><strong>${p.name}</strong></td>
                <td>${p.current.base} ${p.current.seat}</td>
                <td>${p.statusHtml}</td>
                <td>${p.finalAward}</td>
                <td>${p.audit}</td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
