<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Master Command Center | Continuous Waterfall & BPL Logic</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --bg: #040c17; --card: #0b192c; --accent: #00e5ff; --accent-hover: #33ebff;
      --text: #e8eefc; --text-muted: #8ba3c7; --border: rgba(0, 229, 255, 0.15);
      --success: #00ffaa; --danger: #ff4772; --warning: #ffcf33;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
    input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #07111f; color: #fff; box-sizing: border-box; font-size: 14px; outline: none; }
    button { background: var(--accent); color: #021024; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
    button:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: auto; padding: 6px 16px; font-size: 12px; margin-top: 0; }
    .table-container { max-height: 500px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; margin-top: 15px; background: #07111f; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    th { color: var(--accent); text-transform: uppercase; font-size: 11px; position: sticky; top: 0; background: #0b192c; z-index: 10; }
    .action-pill { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; text-transform: uppercase; }
    .action-stay { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.2); }
    .action-awarded { background: rgba(0, 255, 170, 0.1); color: var(--success); border: 1px solid var(--success); }
    .action-danger { background: rgba(255, 71, 114, 0.15); color: var(--danger); border: 1px solid var(--danger); }
    .dash-box { background: #06111f; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-top: 15px; display: none; }
    .dash-stat { font-size: 20px; font-weight: 900; color: var(--accent); }
    .dash-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .audit-trail { font-family: monospace; font-size: 12px; color: var(--text-muted); background: #040c17; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); margin-top: 15px; list-style-type: none; }
    .audit-trail li { margin-bottom: 6px; padding-left: 15px; position: relative; }
    .audit-trail li::before { content: '>'; position: absolute; left: 0; color: var(--accent); font-weight: bold; }
    .audit-success { color: var(--success); }
    .audit-fail { color: var(--danger); }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h2 style="margin-top:0; color:var(--accent);">System Parameters & Overrides</h2>
      <div class="grid" id="modifierGrid"></div>
      <div style="margin-top: 20px; display: flex; gap: 15px; align-items: flex-end;">
        <div style="flex: 1;">
          <button onclick="runAnalysis()" style="margin-top:0; padding: 15px;">Run Continuous Waterfall</button>
        </div>
        <div style="flex: 1;">
          <label>Search Pilot Outcome</label>
          <div style="display: flex; gap: 10px;">
            <input type="number" id="senInput" placeholder="Enter Seniority #">
            <button class="btn-secondary" onclick="searchPilot()" style="margin: 0; padding: 0 20px;">Find</button>
          </div>
        </div>
      </div>

      <div class="dash-box" id="personalDash">
        <h3 style="margin-top:0; color:var(--success);">Pilot Evaluation Log</h3>
        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
          <div><div class="dash-label">Seniority</div><div class="dash-stat" id="dashSen">-</div></div>
          <div><div class="dash-label">Pilot Name</div><div class="dash-stat" id="dashName" style="color: #fff;">-</div></div>
          <div><div class="dash-label">Starting Seat</div><div class="dash-stat" id="dashStart" style="color: #fff;">-</div></div>
        </div>
        <div class="table-container" style="max-height: 250px; margin-top: 15px;">
            <table class="search-results-table">
                <thead><tr><th>Position</th><th>Pref</th><th>Status</th><th>Note</th></tr></thead>
                <tbody id="dashDetailedTable"></tbody>
            </table>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Active System Capacity Snapshot</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Seat</th>
              <th>System Capacity</th>
              <th>Total Pilots Assigned</th>
              <th>Current Vacancy (Delta)</th>
              <th>Most Junior Sen</th>
            </tr>
          </thead>
          <tbody id="globalSummaryTable"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h3 style="margin: 0;">Displacement & Vacancy Ledger</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button onclick="exportFinalAwardsCSV()" class="btn-secondary" style="border-color: var(--success); color: var(--success);">Export Final Awards</button>
          <button onclick="exportAuditCSV()" class="btn-secondary">Export Full Ledger</button>
          <button onclick="exportBPLRostersCSV()" class="btn-secondary" style="border-color: var(--warning); color: var(--warning);">Export Seat Rosters</button>
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead><tr><th>Sen</th><th>Name</th><th>Position</th><th>Pref</th><th>Status</th><th>Note</th></tr></thead>
          <tbody id="competitorTable"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
let ROSTER = [], PREFS = {}, CAPACITIES = {}, NO_BID = new Set(), RETIRED_PILOTS = new Set();
let detailedLedgerLog = [], singlePilotSummary = [], globalSeatLedger = {}; 

const allBases = ["ANC", "LAX", "PDX", "SAN", "SEA", "SFO"];
const allSeats = ["CA", "FO"];

const grid = document.getElementById('modifierGrid');
allBases.forEach(b => {
  allSeats.forEach(s => {
    const div = document.createElement('div');
    div.innerHTML = `<label>${b} ${s} Mod</label><input type="number" id="mod_${b}_${s}" placeholder="0">`;
    grid.appendChild(div);
  });
});

function findCurrent(p) {
  if (!p || !p.current) return "";
  return `${String(p.current.base || "").trim()} ${String(p.current.seat || "").trim()}`.toUpperCase();
}

async function loadData() {
  try {
    const [r, p, c, nb, ret] = await Promise.all([
      fetch('./roster.json').then(res => res.json()).catch(() => []),
      fetch('./preferences.json').then(res => res.json()).catch(() => ({})),
      fetch('./capacities.json').then(res => res.json()).catch(() => []),
      fetch('./nobidpilots.json').then(res => res.json()).catch(() => []),
      fetch('./retired_pilots.json').then(res => res.ok ? res.json() : []).catch(() => [])
    ]);
    
    let uniqueRosterMap = new Map();
    let rawRoster = Array.isArray(r) ? r : Object.values(r);
    rawRoster.forEach(pilot => { if (pilot.sen) uniqueRosterMap.set(parseInt(pilot.sen), pilot); });
    ROSTER = Array.from(uniqueRosterMap.values());
    PREFS = p;
    NO_BID = new Set(nb.map(x => parseInt(x.sen) || parseInt(x)));
    RETIRED_PILOTS = new Set(ret.map(x => parseInt(x.sen) || parseInt(x.seniority) || parseInt(x)));
    
    CAPACITIES = {};
    if (Array.isArray(c)) {
      c.forEach(item => {
        CAPACITIES[`${item.base} ${item.seat}`.toUpperCase()] = { start: parseInt(item.startCapacity) || 0, delta: parseInt(item.delta) || 0 };
      });
    }
    console.log("Data loaded successfully.");
  } catch (e) { 
    console.error("Data load failed.", e); 
    alert("Failed to load JSON data.");
  }
}

function runAnalysis() {
  let seatLedger = {};
  
  allBases.forEach(b => {
    allSeats.forEach(s => {
      const key = `${b} ${s}`;
      let capObj = CAPACITIES[key] || { start: 0, delta: 0 };
      let modValue = parseInt(document.getElementById(`mod_${b}_${s}`).value) || 0;
      
      let baseSystemCap = capObj.start + capObj.delta + modValue;

      seatLedger[key] = {
        baseSystemCapacity: baseSystemCap > 0 ? baseSystemCap : 0, 
        pilots: [] 
      };
    });
  });

  const sortedRoster = [...ROSTER].sort((a, b) => parseInt(a.sen) - parseInt(b.sen));
  let dynamicPilots = [];

  for (let p of sortedRoster) {
    let pSen = parseInt(p.sen);
    if (RETIRED_PILOTS.has(pSen)) continue;

    let startSeat = findCurrent(p);
    let pName = String(p.name || p.pil || "UNKNOWN").toUpperCase();
    let is320 = p.current && Object.values(p.current).some(val => String(val).includes("320"));
    let isExempt = NO_BID.has(pSen) || is320;

    let pObj = {
        sen: pSen, name: pName, startSeat: startSeat, isExempt: isExempt,
        exemptNote: is320 ? "320 Fleet." : "Not allowed to bid.",
        prefs: PREFS[`pil${pSen}`]?.preferences || PREFS[pSen]?.preferences || [],
        currentAward: startSeat,
        pilotRows: []
    };

    pObj.formattedPrefs = [];
    for (let pref of pObj.prefs) {
        let rawBid = String(pref.bid || "").toUpperCase();
        let bMatch = allBases.find(b => rawBid.includes(b));
        let sMatch = allSeats.find(s => rawBid.includes(s));
        if (bMatch && sMatch) {
            pObj.formattedPrefs.push({
                targetSeat: `${bMatch} ${sMatch}`,
                bplMin: parseInt(pref.bpl_min || 0)
            });
        }
    }

    pObj.currentPrefIndex = pObj.formattedPrefs.length; 

    if (startSeat && seatLedger[startSeat]) {
        seatLedger[startSeat].pilots.push(pObj);
    }
    
    dynamicPilots.push(pObj);
  }

  // 2. TRUE CONTINUOUS WATERFALL ENGINE (Rank & Bump Logic)
  let hasChanges = true;
  let safetyCounter = 0;

  while (hasChanges && safetyCounter < 500) {
      hasChanges = false;
      safetyCounter++;

      for (let p of dynamicPilots) {
          if (p.isExempt) continue;

          let awardedPref = -1;
          let targetSeat = null;

          // Check all bid preferences top to bottom
          for (let i = 0; i < p.formattedPrefs.length; i++) {
              let checkSeat = p.formattedPrefs[i].targetSeat;
              let bplMin = p.formattedPrefs[i].bplMin;

              if (!seatLedger[checkSeat]) continue;

              // Calculate Seniority Rank in this seat
              let seniorCount = 0;
              for (let resident of seatLedger[checkSeat].pilots) {
                  if (resident.sen < p.sen) seniorCount++;
              }
              let projectedSpot = seniorCount + 1;

              if (bplMin > 0 && projectedSpot > bplMin) continue;

              // Core check: Can their seniority hold this seat against the capacity?
              if (projectedSpot <= seatLedger[checkSeat].baseSystemCapacity) {
                  awardedPref = i;
                  targetSeat = checkSeat;
                  break; 
              }
          }

          // If they couldn't hold ANY bid, check if they can hold their STARTING seat
          if (awardedPref === -1) {
               if (p.startSeat && seatLedger[p.startSeat]) {
                   let seniorCount = 0;
                   for (let resident of seatLedger[p.startSeat].pilots) {
                       if (resident.sen < p.sen) seniorCount++;
                   }
                   let projectedSpot = seniorCount + 1;
                   
                   if (projectedSpot <= seatLedger[p.startSeat].baseSystemCapacity) {
                       targetSeat = p.startSeat; // Safe from displacement
                       awardedPref = p.formattedPrefs.length; 
                   } else {
                       targetSeat = "UNASSIGNED"; // Kicked to the street!
                       awardedPref = p.formattedPrefs.length;
                   }
               } else {
                   targetSeat = "UNASSIGNED";
                   awardedPref = p.formattedPrefs.length;
               }
          }

          // If their awarded seat changed from last loop, update the arrays
          if (p.currentAward !== targetSeat || p.currentPrefIndex !== awardedPref) {
              // Remove them from wherever they were
              if (p.currentAward && p.currentAward !== "UNASSIGNED" && seatLedger[p.currentAward]) {
                  seatLedger[p.currentAward].pilots = seatLedger[p.currentAward].pilots.filter(x => x.sen !== p.sen);
              }
              
              // Place them in their newly won seat, potentially overflowing it 
              // (which kicks out the junior guy on the next loop)
              if (targetSeat !== "UNASSIGNED" && seatLedger[targetSeat]) {
                  seatLedger[targetSeat].pilots.push(p);
                  seatLedger[targetSeat].pilots.sort((a,b) => a.sen - b.sen);
              }

              p.currentAward = targetSeat;
              p.currentPrefIndex = awardedPref;
              hasChanges = true;
          }
      }
  }

  // 3. AUDIT RECONSTRUCTION & DISPLACEMENT LOGGING
  detailedLedgerLog = [];
  singlePilotSummary = [];

  for (let p of dynamicPilots) {
      p.pilotRows = [];

      if (p.isExempt) {
          detailedLedgerLog.push({sen: p.sen, name: p.name, pos: `737 ${p.startSeat}`, pref: "-", status: "No Bid", note: p.exemptNote, css: "action-stay", displacedFlag: ""});
          singlePilotSummary.push({sen: p.sen, name: p.name, final: p.startSeat});
          continue;
      }

      // Check if they were formally Displaced from their start seat
      let wasDisplaced = false;
      if (p.startSeat && seatLedger[p.startSeat]) {
          let seniorCount = 0;
          for (let resident of seatLedger[p.startSeat].pilots) {
              if (resident.sen < p.sen && !resident.isExempt) seniorCount++;
          }
          if ((seniorCount + 1) > seatLedger[p.startSeat].baseSystemCapacity) {
              wasDisplaced = true;
          }
      }

      let displacementPill = wasDisplaced ? `<span class="action-pill action-danger" style="margin-right:5px; background: #ff0044; color: white;">DISPLACED</span>` : "";

      for (let i = 0; i < p.formattedPrefs.length; i++) {
          let targetSeat = p.formattedPrefs[i].targetSeat;
          let prefNum = i + 1;
          
          if (i < p.currentPrefIndex) {
               let seniorCount = 0;
               for (let resident of seatLedger[targetSeat].pilots) {
                   if (resident.sen < p.sen) seniorCount++;
               }
               let projectedSpot = seniorCount + 1;
               
               p.pilotRows.push({
                   sen: p.sen, name: p.name, pos: `737 ${targetSeat}`, pref: prefNum, 
                   status: "Denied", 
                   note: `Seniority Rank ${projectedSpot} exceeds funded capacity of ${seatLedger[targetSeat].baseSystemCapacity}.`, 
                   css: "action-danger",
                   displacedFlag: ""
               });
          } else if (i === p.currentPrefIndex) {
               p.pilotRows.push({
                   sen: p.sen, name: p.name, pos: `737 ${targetSeat}`, pref: prefNum, 
                   status: "Awarded", 
                   note: wasDisplaced ? "Displaced from original seat, secured lower preference." : "Awarded system vacancy or bumped junior pilot.", 
                   css: "action-awarded",
                   displacedFlag: displacementPill
               });
               break;
          }
      }

      if (p.currentPrefIndex === p.formattedPrefs.length) {
          if (p.currentAward === "UNASSIGNED") {
               p.pilotRows.push({
                   sen: p.sen, name: p.name, pos: `UNASSIGNED`, pref: "-", 
                   status: "Forced Out", 
                   note: "Displaced from current position and failed to hold any bid preference.", 
                   css: "action-danger",
                   displacedFlag: displacementPill
               });
          } else {
               p.pilotRows.push({
                   sen: p.sen, name: p.name, pos: `737 ${p.startSeat}`, pref: "-", 
                   status: "Awarded", 
                   note: "Remain in current position.", 
                   css: "action-stay",
                   displacedFlag: displacementPill
               });
          }
      }

      detailedLedgerLog.push(...p.pilotRows);
      singlePilotSummary.push({sen: p.sen, name: p.name, final: p.currentAward});
  }

  globalSeatLedger = seatLedger; 
  renderUI(seatLedger);
}

function searchPilot() {
  const senNum = parseInt(document.getElementById('senInput').value);
  const rows = detailedLedgerLog.filter(p => p.sen === senNum);
  const dash = document.getElementById('personalDash');
  if (rows.length > 0) {
    dash.style.display = 'block';
    document.getElementById('dashSen').innerText = rows[0].sen;
    document.getElementById('dashName').innerText = rows[0].name;
    document.getElementById('dashDetailedTable').innerHTML = rows.map(r => `<tr><td>${r.pos}</td><td>${r.pref}</td><td>${r.displacedFlag || ""}<span class="action-pill ${r.css}">${r.status}</span></td><td>${r.note}</td></tr>`).join("");
  } else { alert("Pilot not found."); dash.style.display = 'none'; }
}

function renderUI(ledger) {
  let summaryHTML = "";
  allBases.forEach(b => { allSeats.forEach(s => {
      const key = `${b} ${s}`, d = ledger[key], pilots = d.pilots;
      let juniorSen = pilots.length > 0 ? pilots[pilots.length - 1].sen : "N/A";
      let v = d.baseSystemCapacity - pilots.length;
      summaryHTML += `<tr><td>${key}</td><td>${d.baseSystemCapacity}</td><td>${pilots.length}</td><td style="color:${v >= 0 ? 'var(--success)' : 'var(--danger)'}">${v}</td><td>${juniorSen}</td></tr>`;
  }); });
  document.getElementById("globalSummaryTable").innerHTML = summaryHTML;
  document.getElementById("competitorTable").innerHTML = detailedLedgerLog.map(c => `<tr><td>${c.sen}</td><td>${c.name}</td><td>${c.pos}</td><td>${c.pref}</td><td>${c.displacedFlag || ""}<span class="action-pill ${c.css}">${c.status}</span></td><td style="font-size:11px">${c.note}</td></tr>`).join("");
}

function exportFinalAwardsCSV() {
  let csv = "Seniority,Pilot Name,Final Base,Final Seat\n";
  singlePilotSummary.forEach(r => {
    let p = r.final.split(" ");
    csv += `"${r.sen}","${r.name}","${p[0] || "UNASSIGNED"}","${p[1] || ""}"\n`;
  });
  triggerDownload(new Blob([csv], { type: 'text/csv' }), 'Final_Awards.csv');
}

function exportAuditCSV() {
  let csv = "Sen,Name,Position,Pref,Status,Note\n";
  detailedLedgerLog.forEach(r => { csv += `"${r.sen}","${r.name}","${r.pos}","${r.pref}","${r.status}","${r.note}"\n`; });
  triggerDownload(new Blob([csv], { type: 'text/csv' }), 'Full_Ledger.csv');
}

function exportBPLRostersCSV() {
  let csv = "Seat,Rank,Sen,Name\n";
  allBases.forEach(b => { allSeats.forEach(s => {
    const key = `${b} ${s}`;
    if (globalSeatLedger[key]) {
        let activePilots = globalSeatLedger[key].pilots.filter(x => !x.isExempt);
        activePilots.forEach((p, index) => { 
            csv += `"${key}","${index + 1}","${p.sen}","${p.name}"\n`; 
        });
    }
  }); });
  triggerDownload(new Blob([csv], { type: 'text/csv' }), 'BPL_Rosters.csv');
}

function triggerDownload(blob, filename) {
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
}

window.onload = loadData;
</script>
</body>
</html>
