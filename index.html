<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>737 Master Bid Control - BPL Audit Mode</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #ffd33d; --purple: #bc8cff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .cap-cell { display: flex; flex-direction: column; font-size: 0.7rem; }
        .cap-cell input { background: #0d1117; border: 1px solid var(--border); color: #4ade80; padding: 5px; border-radius: 4px; font-weight: bold; }
        .dash-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .dash-box { background: #1a1d23; border: 1px solid var(--border); padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; }
        .dash-title { margin: 0 0 10px 0; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        .audit-step { display: block; font-size: 0.75rem; margin-bottom: 4px; border-bottom: 1px solid #30363d; padding-bottom: 2px; }
        .denied-text { color: var(--red); font-weight: 500; }
        .awarded-text { color: var(--green); font-weight: bold; }
        .via-text { color: var(--accent); font-size: 0.7rem; font-style: italic; display: block; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        th { background: #21262d; color: var(--accent); text-align: left; padding: 12px; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: top; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; margin-left: 5px; text-transform: uppercase; display: inline-block; }
        .tag-red { background: var(--red); color: white; }
        .tag-yellow { background: var(--yellow); color: #000; }
        .rank-badge { background: #30363d; padding: 3px 7px; border-radius: 4px; color: #4ade80; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin:0">Position Deltas (737 Fleet)</h3>
        <div id="capGrid" class="cap-grid">Loading...</div>
    </div>

    <div class="dash-container">
        <div class="dash-box"><h4 class="dash-title" style="color:var(--red)">🛑 Self-Displaced</h4><div id="selfDispList">Ready...</div></div>
        <div class="dash-box"><h4 class="dash-title" style="color:var(--yellow)">🚚 Movers</h4><div id="moversList">Ready...</div></div>
        <div class="dash-box"><h4 class="dash-title" style="color:var(--purple)">🆘 Displaced</h4><div id="unassignedList">Ready...</div></div>
        <div class="dash-box"><h4 class="dash-title" style="color:var(--accent)">⚙️ Engine Status</h4><div id="statusBox" style="font-size: 0.75rem;">Idle.</div></div>
    </div>

    <div class="toolbar" style="margin-bottom:20px;">
        <button id="runBtn" style="background:var(--green); color:white; padding:10px 20px; font-weight:bold; border:none; border-radius:6px; cursor:pointer;">RUN BID</button>
        <button id="expBase" style="padding:10px; margin-left:10px; cursor:pointer;">CSV: BASE</button>
        <button id="expMaster" style="padding:10px; margin-left:10px; cursor:pointer;">CSV: MASTER</button>
        <button id="expLog" style="padding:10px; margin-left:10px; cursor:pointer;">CSV: LOG</button>
        <input type="number" id="lookupInput" style="padding:10px; background:#0d1117; color:white; border:1px solid var(--border); border-radius:6px; width:120px; margin-left:20px;" placeholder="Sen #">
        <button id="lookupBtn" style="padding:10px; border-radius:6px; background:var(--accent); color:white; border:none; cursor:pointer;">LOOKUP</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Sen #</th>
                <th>Pilot Name</th>
                <th>Awarded Position</th>
                <th>Standing</th>
                <th>Notes / Mathematical Audit Path</th>
                <th>Original Position</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
let store = { roster: [], prefs: {}, caps: [], retired: [], noBid: [] };
let lastResults = [];
let fillers = {};

function runBidEngine(data, deltaMap) {
    const is737 = (seat) => seat && !seat.includes('320') && !seat.includes('321');
    let targetMap = {};
    fillers = {};
    
    // 1. Keyword Scanner for "73G PDX FO"
    const getTargetKey = (bidStr) => {
        if (!bidStr || String(bidStr).trim() === "" || bidStr === "0") return null;
        const parts = String(bidStr).trim().toUpperCase().split(/\s+/);
        const bases = ['SEA', 'PDX', 'ANC', 'SFO', 'LAX', 'SAN', 'LAS'];
        const seats = ['CA', 'FO'];
        let b = parts.find(x => bases.includes(x));
        let s = parts.find(x => seats.includes(x));
        return (b && s) ? `${b}-${s}` : null;
    };

    // 2. Initialize Hard Capacities (Roster Count + Delta)
    let initialCounts = {};
    data.roster.forEach(p => {
        if (is737(p.current.seat)) {
            const key = `${p.current.base}-${p.current.seat}`.toUpperCase();
            initialCounts[key] = (initialCounts[key] || 0) + 1;
        }
    });

    data.caps.forEach(c => {
        const key = `${c.base}-${c.seat}`.toUpperCase();
        targetMap[key] = (initialCounts[key] || 0) + (deltaMap[key] || 0);
        fillers[key] = 0;
    });

    const retiredSens = new Set(data.retired.filter(p => is737(p.seat)).map(p => p.seniority));
    const noBidSens = new Set(data.noBid.filter(p => is737(p.seat)).map(p => p.sen));

    const bidders = data.roster
        .filter(p => is737(p.current.seat) && !retiredSens.has(p.sen) && !noBidSens.has(p.sen))
        .map(p => {
            let found = data.prefs['pil' + p.sen] || data.prefs[p.id] || data.prefs[p.sen];
            let prefData = found ? (found.preferences || found.bids || []) : [];
            const pilotOrig = `${p.current.base}-${p.current.seat}`.toUpperCase();

            const cleanPrefs = prefData.map(pr => ({
                ...pr,
                targetKey: getTargetKey(pr.bid || pr.position),
                bpl: parseInt(pr.bpl_min || pr.bpl || 0)
            })).filter(pr => pr.targetKey);

            // Seth's Fix: Does he have a BPL on his original seat?
            const bplOnOwn = cleanPrefs.some(pr => pr.targetKey === pilotOrig && pr.bpl > 0);

            return {
                ...p, orig: pilotOrig, currentKey: "UNASSIGNED", awardAudit: [],
                finalReason: "", isMover: false, isSelfDisp: false,
                bplOnOwn: bplOnOwn,
                prefs: cleanPrefs
            };
        }).sort((a, b) => a.sen - b.sen);

    bidders.forEach(p => {
        let awarded = false;
        
        // STEP 1: PREFERENCE LOOP
        for (const pr of p.prefs) {
            let rank = fillers[pr.targetKey] + 1;
            let cap = targetMap[pr.targetKey] || 0;
            let bplLimit = pr.bpl > 0 ? pr.bpl : 9999;

            if (rank <= cap && rank <= bplLimit) {
                p.currentKey = pr.targetKey;
                fillers[pr.targetKey]++;
                p.awardAudit.push(`<span class="awarded-text">Awarded ${pr.targetKey}</span> (Rank ${rank} | BPL ${pr.bpl || 'None'})`);
                awarded = true;
                p.finalReason = "Bid Award";
                p.isMover = (p.currentKey !== p.orig);
                break;
            } else {
                let reason = rank > cap ? "Full" : "BPL Fail";
                p.awardAudit.push(`${pr.order}) ${pr.targetKey}: <span class="denied-text">${reason}</span> (${rank})`);
            }
        }

        // STEP 2: SENIORITY HOLD (The Fail-Safe)
        // If they have bplOnOwn, they SKIP this step. No safety net.
        if (!awarded && !p.bplOnOwn) {
            const targetKey = p.orig;
            let cap = targetMap[targetKey] || 0;
            let rank = fillers[targetKey] + 1;
            
            if (rank <= cap) {
                fillers[targetKey]++;
                p.currentKey = targetKey;
                p.awardAudit.push(`<span class="awarded-text">Seniority Hold ${targetKey}</span> (Rank ${rank} / ${cap})`);
                awarded = true;
                p.finalReason = "Seniority Hold";
                p.isMover = false;
            } else {
                p.awardAudit.push(`${p.orig} Hold: <span class="denied-text">Displaced</span> Rank ${rank} > ${cap}`);
            }
        }

        if (!awarded) {
            p.currentKey = "UNASSIGNED";
            p.isSelfDisp = p.bplOnOwn;
            p.finalReason = p.isSelfDisp ? "Self-Displaced (BPL Fail)" : "Displaced (Juniority)";
            p.awardAudit.push(`<span class="denied-text">POOL</span>`);
        }
    });
    return { roster: bidders, targetMap };
}

window.onload = async () => {
    try {
        const files = ['roster.json', 'preferences.json', 'capacities.json', 'retired_pilots.json', 'nobidpilots.json'];
        const results = await Promise.all(files.map(async f => { const r = await fetch(f); return await r.json(); }));
        store = { roster: results[0], prefs: results[1], caps: results[2], retired: results[3], noBid: results[4] };
        renderCapacities();
    } catch (e) { console.error(e); }
};

function renderCapacities() {
    document.getElementById('capGrid').innerHTML = store.caps.map(c => `
        <div class="cap-cell"><label>${c.base} ${c.seat}</label><input type="number" id="delta-${c.base}-${c.seat}" value="0"></div>`).join('');
}

function downloadCSV(filename, rows) {
    const csvContent = rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob); link.setAttribute("download", filename); link.click();
}

document.getElementById('runBtn').onclick = () => {
    const deltas = {};
    store.caps.forEach(c => {
        const key = `${c.base}-${c.seat}`.toUpperCase();
        deltas[key] = parseInt(document.getElementById(`delta-${c.base}-${c.seat}`).value) || 0;
    });
    const result = runBidEngine(store, deltas);
    lastResults = result.roster;
    document.getElementById('statusBox').innerHTML = `Processed: ${lastResults.length} Pilots`;
    renderTable(lastResults, result.targetMap);
    renderDashboards(lastResults);
};

document.getElementById('expBase').onclick = () => {
    const rows = [["Sen #", "Name", "Base", "Seat"], ...lastResults.map(p => [p.sen, p.name, p.currentKey.split('-')[0], p.currentKey.split('-')[1] || "POOL"])];
    downloadCSV("Base_List.csv", rows);
};
document.getElementById('expMaster').onclick = () => {
    const rows = [["Sen #", "Name", "Awarded", "Original", "Reason"], ...lastResults.map(p => [p.sen, p.name, p.currentKey, p.orig, p.finalReason])];
    downloadCSV("Master_Awards.csv", rows);
};
document.getElementById('expLog').onclick = () => {
    const rows = [["Sen #", "Name", "Audit Log"], ...lastResults.map(p => [p.sen, p.name, p.awardAudit.join(" | ")])];
    downloadCSV("Audit_Log.csv", rows);
};

function renderTable(roster, targetMap) {
    document.getElementById('tableBody').innerHTML = roster.map(p => {
        let tags = '';
        if (p.isSelfDisp) tags += '<span class="tag tag-red">SELF-DISPLACED</span>';
        if (p.isMover) tags += '<span class="tag tag-yellow">MOVER</span>';

        let finalRank = 1;
        roster.forEach(other => { if (other.sen < p.sen && other.currentKey === p.currentKey) finalRank++; });
        const limit = targetMap[p.currentKey] || 0;

        return `
            <tr>
                <td>${p.sen}</td>
                <td><strong>${p.name}</strong><br>${tags}</td>
                <td style="color:${p.isMover?'#3fb950':''}">${p.currentKey.replace('-', ' ')}</td>
                <td><span class="rank-badge">${p.currentKey === "UNASSIGNED" ? "-" : finalRank + " / " + limit}</span></td>
                <td>
                    ${p.awardAudit.map(a => `<span class="audit-step">${a}</span>`).join('')}
                    <span class="via-text">via ${p.finalReason}</span>
                </td>
                <td>${p.orig.replace('-',' ')}</td>
            </tr>`;
    }).join('');
}

function renderDashboards(roster) {
    let unHtml = ''; let sDHtml = ''; let mHtml = '';
    roster.forEach(p => {
        const item = `<div>#${p.sen} ${p.name}</div>`;
        if (p.isSelfDisp) sDHtml += item;
        else if (p.currentKey === "UNASSIGNED") unHtml += item;
        if (p.isMover) mHtml += item;
    });
    document.getElementById('selfDispList').innerHTML = sDHtml || "None.";
    document.getElementById('moversList').innerHTML = mHtml || "None.";
    document.getElementById('unassignedList').innerHTML = unHtml || "None.";
}
</script>
</body>
</html>
