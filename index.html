<!doctype html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>  
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live System Award Ledger</title>
  
  <meta name="robots" content="noindex, nofollow">

  <style>
    /* Alaska Shades of Blue Theme */
    :root {
      --bg: #040c17; 
      --card: #0b192c; 
      --accent: #00e5ff; 
      --accent-hover: #33ebff;
      --text: #e8eefc; 
      --text-muted: #8ba3c7;
      --border: rgba(0, 229, 255, 0.15);
      --success: #00ffaa; 
      --danger: #ff4772; 
      --warning: #ffcf33;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    
    label { display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
    input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #07111f; color: #fff; box-sizing: border-box; font-size: 14px; outline: none; transition: border-color 0.2s; }
    input:focus, select:focus { border-color: var(--accent); }
    
    button { background: var(--accent); color: #021024; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3); }
    button:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4); }
    
    .btn-secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: auto; padding: 6px 16px; font-size: 12px; margin-top: 0; box-shadow: none; }
    .btn-secondary:hover { background: rgba(0, 229, 255, 0.1); color: var(--accent-hover); box-shadow: none; }

    .big-num { font-size: 36px; font-weight: 900; color: var(--accent); letter-spacing: -0.5px; margin-top: 5px; }
    
    /* Scrollable Table Container */
    .table-container { max-height: 500px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; margin-top: 15px; background: #07111f; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    th { color: var(--accent); text-transform: uppercase; font-size: 11px; font-weight: 800; letter-spacing: 0.5px; position: sticky; top: 0; background: #0b192c; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    tr:hover { background: rgba(0, 229, 255, 0.03); }
    
    .action-pill { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .action-awarded { background: rgba(0, 255, 170, 0.1); color: var(--success); border: 1px solid var(--success); }
    .action-stay { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.2); }
    .ledger-text { font-family: monospace; font-size: 12px; color: var(--warning); }

    .summary-text { font-size: 14px; font-weight: 600; color: var(--accent); margin-top: 10px; }
    .data-dates { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: -5px; margin-bottom: 24px; font-weight: 600; line-height: 1.6; text-transform: uppercase; letter-spacing: 1px; }
    
    .status-card { text-align: center; padding: 30px; border: 2px solid var(--border); background: #06111f; box-shadow: inset 0 0 40px rgba(0,0,0,0.5); }
    #awardStatus { font-size: 38px; font-weight: 900; margin-top: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--success); }
    #vacancyMath { font-size: 16px; color: var(--warning); margin-top: 8px; font-weight: 600; font-family: monospace; }

    .override-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 15px; }
    .override-input-group { background: #07111f; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
    .override-input-group label { margin-bottom: 4px; font-size: 10px; color: var(--accent); }
    .override-input-group input { padding: 8px; text-align: center; font-weight: 700; background: #040c17; }
    .override-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
    .override-header h3 { margin: 0; font-size: 14px; color: var(--accent); text-transform: uppercase; }
    
    @media (max-width: 800px) {
      .override-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2 style="text-align: center; margin-top: 0; margin-bottom: 5px; font-weight: 900; letter-spacing: -0.5px;">System Award Ledger</h2>
      <div class="data-dates">
        Seniority Data: FEB 2026 | Bid Data: 06-2026
      </div>

      <div style="max-width: 400px; margin: 0 auto; text-align: center;">
        <label>Your Seniority Lookup #</label>
        <input id="senInput" type="number" placeholder="e.g. 2670" style="text-align: center; font-size: 18px; font-weight: bold;">
      </div>
    </div>

    <div class="card">
      <div class="override-header">
        <h3>Global Vacancy Adjustments</h3>
        <span style="font-size: 11px; color: var(--text-muted);">Enter (+/-) values to override the bid</span>
      </div>
      
      <div class="override-grid">
        <div class="override-input-group"><label>ANC CA</label><input type="number" id="mod_ANC_CA" placeholder="0"></div>
        <div class="override-input-group"><label>ANC FO</label><input type="number" id="mod_ANC_FO" placeholder="0"></div>
        <div class="override-input-group"><label>LAX CA</label><input type="number" id="mod_LAX_CA" placeholder="0"></div>
        <div class="override-input-group"><label>LAX FO</label><input type="number" id="mod_LAX_FO" placeholder="0"></div>
        <div class="override-input-group"><label>PDX CA</label><input type="number" id="mod_PDX_CA" placeholder="0"></div>
        <div class="override-input-group"><label>PDX FO</label><input type="number" id="mod_PDX_FO" placeholder="0"></div>
        <div class="override-input-group"><label>SAN CA</label><input type="number" id="mod_SAN_CA" placeholder="0"></div>
        <div class="override-input-group"><label>SAN FO</label><input type="number" id="mod_SAN_FO" placeholder="0"></div>
        <div class="override-input-group"><label>SEA CA</label><input type="number" id="mod_SEA_CA" placeholder="0"></div>
        <div class="override-input-group"><label>SEA FO</label><input type="number" id="mod_SEA_FO" placeholder="0"></div>
        <div class="override-input-group"><label>SFO CA</label><input type="number" id="mod_SFO_CA" placeholder="0"></div>
        <div class="override-input-group"><label>SFO FO</label><input type="number" id="mod_SFO_FO" placeholder="0"></div>
      </div>
      
      <button id="calcBtn" style="margin-top: 20px;">Run Full System Award</button>
    </div>

    <div class="grid">
      <div class="card status-card" style="grid-column: 1 / -1;">
        <label>Your Final Awarded Seat</label>
        <div id="awardStatus" style="color: var(--text-muted);">AWAITING DATA</div>
        <div id="vacancyMath">Enter your seniority and run the system award.</div>
      </div>
      <div class="card" style="text-align:center;">
        <label>Your Starting Seat</label>
        <div id="dashStarting" class="big-num" style="color: var(--text);">-</div>
      </div>
      <div class="card" style="text-align:center;">
        <label>Movement Status</label>
        <div id="dashAction" class="big-num" style="color: var(--text-muted);">-</div>
      </div>
    </div>

    <div class="card">
      <div class="override-header">
        <h3>System Award Ledger Log</h3>
        <button id="exportBtn" class="btn-secondary">Export Full CSV Ledger</button>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Sen #</th>
              <th>Starting Seat</th>
              <th>Final Award</th>
              <th>Status</th>
              <th>Vacancy Ledger Source</th>
            </tr>
          </thead>
          <tbody id="competitorTable"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
let ROSTER = [], PREFS = {}, CAPACITIES = {};
let fullSystemLog = []; 

function findCurrent(p) {
  if (!p || !p.current) return "";
  const b = p.current.base || "";
  const s = p.current.seat || "";
  return `${String(b).trim()} ${String(s).trim()}`;
}

function updatePlaceholders() {
  if (Object.keys(CAPACITIES).length === 0) return;
  const allBases = ["ANC", "LAX", "PDX", "SAN", "SEA", "SFO"];
  const allSeats = ["CA", "FO"];
  allBases.forEach(b => {
    allSeats.forEach(s => {
      const key = `${b} ${s}`;
      let defCap = parseInt(CAPACITIES[key]) || 0;
      if (defCap < 0) defCap = 0;
      let el = document.getElementById(`mod_${b}_${s}`);
      if (el) el.placeholder = `Default: ${defCap}`;
    });
  });
}

async function loadData() {
  try {
    const [r, p, c] = await Promise.all([
      fetch('./roster.json').then(res => res.json()),
      fetch('./preferences.json').then(res => res.json()),
      fetch('./capacities.json').then(res => res.json())
    ]);
    
    ROSTER = Array.isArray(r) ? r : Object.values(r);
    PREFS = p;
    
    CAPACITIES = {};
    if (Array.isArray(c)) {
      c.forEach(item => {
        if (item.base && item.seat) {
          CAPACITIES[`${item.base} ${item.seat}`] = item.delta || 0;
        }
      });
    } else {
      CAPACITIES = c;
    }
    updatePlaceholders();
  } catch (e) { 
    console.error("Error loading JSON files."); 
  }
}

function runAnalysis() {
  const mySen = parseInt(document.getElementById("senInput").value);
  
  // 1. Initialize Dual-Track Ledger for all categories
  let seatLedger = {};
  const allBases = ["ANC", "LAX", "PDX", "SAN", "SEA", "SFO"];
  const allSeats = ["CA", "FO"];
  
  allBases.forEach(b => {
    allSeats.forEach(s => {
      const key = `${b} ${s}`;
      let basePublished = parseInt(CAPACITIES[key]) || 0;
      if (basePublished < 0) basePublished = 0; 
      
      const modInput = document.getElementById(`mod_${b}_${s}`);
      let modValue = 0;
      if (modInput && modInput.value !== "") {
        modValue = parseInt(modInput.value) || 0;
      }
      
      const startingPrimary = Math.max(0, basePublished + modValue);
      seatLedger[key] = {
        primaryRemaining: startingPrimary,
        secondaryQueue: [] // Array of Sen #s who vacated this seat
      };
    });
  });

  let categorySeniority = {}; 
  fullSystemLog = []; 

  const sortedRoster = [...ROSTER].sort((a, b) => parseInt(a.sen) - parseInt(b.sen));

  // 2. FULL SYSTEM CASCADE ENGINE
  for (const p of sortedRoster) {
    const pSen = parseInt(p.sen);
    const startingSeat = findCurrent(p);
    const pPrefObj = PREFS[`pil${pSen}`] || PREFS[pSen];
    
    let awardedSeat = startingSeat; 
    let actionType = "stay"; 
    let ledgerReason = "-";

    if (pPrefObj && pPrefObj.preferences && pPrefObj.preferences.length > 0) {
      for (const entry of pPrefObj.preferences) {
        const bidStr = String(entry.bid || "").trim();
        if (bidStr === "" || !seatLedger[bidStr]) continue;

        // BPL Check
        const bplVal = parseInt(entry.bpl_min || 0);
        const projectedCatSen = (categorySeniority[bidStr] || 0) + 1; 
        if (bplVal > 0 && projectedCatSen > bplVal) {
          continue; // Blocked by BPL
        }

        // Check if bidding to stay put
        if (bidStr === startingSeat) {
          awardedSeat = startingSeat;
          actionType = "stay";
          ledgerReason = "Held Current Seat";
          break;
        }

        // Check availability (Primary + Secondary)
        let availableSpots = seatLedger[bidStr].primaryRemaining + seatLedger[bidStr].secondaryQueue.length;
        
        if (availableSpots > 0) {
          awardedSeat = bidStr;
          actionType = "awarded";
          
          // Determine Ledger Origin
          if (seatLedger[bidStr].primaryRemaining > 0) {
            let before = seatLedger[bidStr].primaryRemaining;
            seatLedger[bidStr].primaryRemaining--;
            ledgerReason = `Primary Vacancy (${before} -> ${seatLedger[bidStr].primaryRemaining})`;
          } else {
            let providerSen = seatLedger[bidStr].secondaryQueue.shift();
            ledgerReason = `Secondary Vacancy (Created by Sen #${providerSen})`;
          }
          
          // Add vacated seat to the secondary queue for the rest of the airline
          if (startingSeat !== "" && seatLedger[startingSeat]) {
            seatLedger[startingSeat].secondaryQueue.push(pSen);
          }
          break; 
        }
      }
    }

    // Default reason if no valid bids were found or processed
    if (awardedSeat === startingSeat && ledgerReason === "-") {
      ledgerReason = "Held Current Seat (No Target Met / BPL Blocked)";
    }

    if (awardedSeat !== "") {
      categorySeniority[awardedSeat] = (categorySeniority[awardedSeat] || 0) + 1;
    }

    // Push to Full System Log
    fullSystemLog.push({
      sen: pSen,
      start: startingSeat || "N/A",
      final: awardedSeat || "N/A",
      status: (actionType === "awarded") ? "MOVED" : "HELD",
      ledger: ledgerReason,
      css: (actionType === "awarded") ? "action-awarded" : "action-stay"
    });
  }

  // 3. RENDER UI FOR SPECIFIC SENIORITY
  const myLog = fullSystemLog.find(l => l.sen === mySen);
  
  if (myLog) {
    document.getElementById("dashStarting").textContent = myLog.start;
    document.getElementById("dashAction").textContent = myLog.status;
    document.getElementById("dashAction").style.color = (myLog.status === "MOVED") ? "var(--success)" : "var(--text-muted)";
    
    document.getElementById("awardStatus").textContent = myLog.final;
    document.getElementById("awardStatus").style.color = (myLog.status === "MOVED") ? "var(--success)" : "var(--accent)";
    
    document.getElementById("vacancyMath").textContent = `Ledger: ${myLog.ledger}`;
  } else {
    document.getElementById("awardStatus").textContent = "PILOT NOT FOUND";
    document.getElementById("vacancyMath").textContent = "Check Seniority # and try again.";
  }

  // Render Master Log Table
  document.getElementById("competitorTable").innerHTML = fullSystemLog.map(c => `
    <tr>
      <td>${c.sen}</td>
      <td>${c.start}</td>
      <td><span style="font-weight: 800; color: ${c.status === 'MOVED' ? 'var(--success)' : 'var(--text-muted)'}">${c.final}</span></td>
      <td><span class="action-pill ${c.css}">${c.status}</span></td>
      <td class="ledger-text">${c.ledger}</td>
    </tr>
  `).join("");
}

function exportToCSV() {
  if (!fullSystemLog || fullSystemLog.length === 0) {
    alert("No data to export. Please run the full system award first.");
    return;
  }
  
  let csvContent = "Seniority,Starting Seat,Final Awarded Seat,Movement Status,Vacancy Ledger Source\n";
  
  fullSystemLog.forEach(row => {
    // Wrap ledger in quotes in case of commas
    csvContent += `${row.sen},${row.start},${row.final},${row.status},"${row.ledger}"\n`;
  });
  
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", "Master_System_Award_Ledger.csv");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

document.getElementById("calcBtn").addEventListener("click", runAnalysis);
document.getElementById("exportBtn").addEventListener("click", exportToCSV);

loadData();
</script>
</body>
</html>
