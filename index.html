<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Airline Position Bid Engine</title>
    <style>
        :root { --primary: #005eb8; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { background: #f1f5f9; font-weight: 600; }
        .cap-input { width: 70px; padding: 6px; border: 1px solid var(--border); border-radius: 4px; text-align: center; }
        .btn-run { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .btn-run:hover { background: #004a94; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .moved { background: #dcfce7; color: #166534; }
        .displaced { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Airline Position Bid Engine</h1>
            <button class="btn-run" onclick="runBid()">🚀 Run Bid</button>
        </div>

        <div class="card">
            <h2>Base Capacities</h2>
            <table id="cap-table">
                <thead>
                    <tr>
                        <th>Position</th>
                        <th>Current</th>
                        <th>Retiring</th>
                        <th>Target Capacity</th>
                        <th>Delta</th>
                    </tr>
                </thead>
                <tbody id="cap-body">
                    <tr><td colspan="5">Fetching data from GitHub...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="results-area" class="card" style="display:none;">
            <h2>Award Results</h2>
            <table id="results-table">
                <thead>
                    <tr>
                        <th>Sen</th>
                        <th>Name</th>
                        <th>Original Position</th>
                        <th>Awarded Position</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
        </div>
    </div>

    <script src="engine.js"></script>
</body>
</html>
