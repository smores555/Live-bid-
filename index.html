<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>737 Bid Control Center - Validation Master</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --green: #3fb950; --red: #f85149; --warning: #d29922; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .config-card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .cap-cell { display: flex; flex-direction: column; font-size: 0.7rem; }
        .cap-cell label { color: var(--accent); font-weight: bold; margin-bottom: 3px; }
        .cap-cell input { background: #0d1117; border: 1px solid var(--border); color: #4ade80; padding: 5px; border-radius: 4px; font-weight: bold; }

        .toolbar { display: flex; align-items: center; gap: 10px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* THE NEW VALIDATION BOX */
        .mismatch-card { background: #2a1215; border: 1px solid var(--red); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .mismatch-title { color: #ff7b72; margin: 0 0 10px 0; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .mismatch-grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-height: 400px; overflow-y: auto; }
        .mismatch-item { background: var(--card); border-left: 4px solid var(--red); padding: 10px; font-size: 0.85rem; }

        .audit-box { background: #0d1117; border: 1px solid var(--accent); border-radius: 8px; padding: 15px; font-family: monospace; font-size: 0.8rem; max-height: 300px; overflow-y: auto; margin-bottom: 20px; line-height: 1.5; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #21262d; color: var(--accent); text-align: left; padding: 12px; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: top; }
        
        .pref-breakdown { font-size: 0.75rem; margin-top: 8px; color: #8b949e; border-top: 1px dashed #30363d; padding-top: 8px; }
        .status-Awarded { color: var(--green); font-weight: bold; }
        .status-Denied { color: var(--red); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="config-card">
        <h3 style="margin:0">Position Deltas (737 Fleet)</h3>
        <div id="capGrid" class="cap-grid">Loading Data...</div>
    </div>

    <div id="validationBox" class="mismatch-card hidden">
        <h3 class="mismatch-title">⚠️ Validation Mismatch Audit (<span id="mismatchCount">0</span> Errors Found)</h3>
        <div id="mismatchList" class="mismatch-grid"></div>
    </div>

    <div class="toolbar">
        <button id="runBtn" class="btn">RUN POSITION BID</button>
        <span id="loadInfo" style="font-size: 0.85rem; color: var(--accent);">Initializing...</span>
        <div style="flex-grow: 1;"></div>
        <input type="number" id="lookupInput" style="padding:10px; border-radius:6px; border:1px solid var(--border); background:#0d1117; color:white; width:150px;" placeholder="Lookup Sen #">
        <button id="lookupBtn" class="btn" style="background:#30363d;">PILOT LOOKUP</button>
    </div>

    <div id="auditLog" class="audit-box">Run the bid to see the seniority cascade.</div>

    <table id="mainTable">
        <thead>
            <tr>
                <th>Sen #</th>
                <th>Pilot & Preference History</th>
                <th>Original</th>
                <th>Awarded</th>
                <th>Status</th>
                <th>Validation</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script src="engine.js"></script>
<script>
    let store = {};
    let answerKey = {};
    let lastResults = [];

    function parseCSV(text) {
        const rows = [];
        let currentRow = [];
        let field = '';
        let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const next = text[i+1];
            if (inQuotes) {
                if (char === '"' && next === '"') { field += '"'; i++; }
                else if (char === '"') inQuotes = false;
                else field += char;
            } else {
                if (char === '"') inQuotes = true;
                else if (char === ',') { currentRow.push(field); field = ''; }
                else if (char === '\n' || char === '\r') {
                    currentRow.push(field);
                    if (currentRow.length > 1) rows.push(currentRow);
                    currentRow = []; field = '';
                    if (char === '\r' && next === '\n') i++;
                } else field += char;
            }
        }
        if (currentRow.length > 0 || field !== '') { currentRow.push(field); rows.push(currentRow); }
        return rows;
    }

    window.onload = async () => {
        const files = ['roster.json', 'preferences.json', 'capacities.json', 'retired_pilots.json', 'nobidpilots.json', 'answer_key.csv'];
        try {
            const results = await Promise.all(files.map(async f => {
                const r = await fetch(f);
                return f.endsWith('.csv') ? r.text() : r.json();
            }));
            store = { roster: results[0], prefs: results[1], caps: results[2], retired: results[3], noBid: results[4] };
            parseCSV(results[5]).forEach((cols, idx) => {
                if (idx > 0 && cols[0]) answerKey[cols[0].trim()] = cols[2]?.trim();
            });
            document.getElementById('loadInfo').innerText = "737 Fleet Ready.";
            renderCapacities();
        } catch (e) { document.getElementById('loadInfo').innerText = "Error: " + e.message; }
    };

    function renderCapacities() {
        document.getElementById('capGrid').innerHTML = store.caps.map(c => `
            <div class="cap-cell"><label>${c.base} ${c.seat}</label><input type="number" id="delta-${c.base}-${c.seat}" value="${c.delta}"></div>
        `).join('');
    }

    document.getElementById('runBtn').onclick = () => {
        const deltas = {};
        store.caps.forEach(c => deltas[`${c.base}-${c.seat}`] = parseInt(document.getElementById(`delta-${c.base}-${c.seat}`).value) || 0);
        const result = runBidEngine(store, deltas);
        lastResults = result.roster;
        
        document.getElementById('auditLog').innerHTML = result.auditTrail.map(a => `
            <div style="border-bottom: 1px solid #21262d; padding: 4px 0;">[Pass ${a.loop}] <strong>#${a.sen} ${a.name}</strong> awarded <strong>${a.to}</strong><br>&nbsp;&nbsp;→ Vacated ${a.from} (${a.fromTrans}) | Filled ${a.to} (${a.toTrans})</div>
        `).join('');

        renderTable(lastResults);
        renderValidationAudit(lastResults);
        document.getElementById('loadInfo').innerText = `Done: ${result.loops} cascades.`;
    };

    document.getElementById('lookupBtn').onclick = () => {
        const sen = document.getElementById('lookupInput').value;
        if (sen && lastResults.length) renderTable(lastResults.filter(p => p.sen.toString() === sen));
    };

    // NEW FUNCTION: Logic for the Mismatch Master Box
    function renderValidationAudit(roster) {
        const mismatchList = document.getElementById('mismatchList');
        const validationBox = document.getElementById('validationBox');
        let mismatchCount = 0;
        let html = '';

        roster.forEach(p => {
            const awarded = p.currentKey.replace('-', ' ');
            const companyRaw = (answerKey[p.sen.toString()] || "No Key").trim();
            const companyClean = companyRaw.replace(/^(737|73G|320|321)\s+/, '');
            const isMatch = companyRaw !== "No Key" && companyClean.includes(awarded);

            if (!isMatch) {
                mismatchCount++;
                html += `
                <div class="mismatch-item">
                    <strong>#${p.sen} ${p.name}</strong><br>
                    Our Engine: <span style="color:var(--red)">${awarded}</span> | 
                    Company Key: <span style="color:var(--green)">${companyRaw}</span>
                    <div style="font-size:0.7rem; color:#8b949e; margin-top:5px;">
                        Check BPL Rank Logic or Fleet Purge settings.
                    </div>
                </div>`;
            }
        });

        if (mismatchCount > 0) {
            mismatchList.innerHTML = html;
            document.getElementById('mismatchCount').innerText = mismatchCount;
            validationBox.classList.remove('hidden');
        } else {
            validationBox.classList.add('hidden');
        }
    }

    function renderTable(roster) {
        document.getElementById('tableBody').innerHTML = roster.map(p => {
            const awarded = p.currentKey.replace('-', ' ');
            const companyRaw = answerKey[p.sen.toString()] || "No Key";
            const companyClean = companyRaw.replace(/^(737|73G|320|321)\s+/, '');
            const isMatch = companyRaw !== "No Key" && companyClean.includes(awarded);
            
            let prefHtml = '<div class="pref-breakdown">';
            for (let order in (p.prefHistory || {})) {
                const h = p.prefHistory[order];
                prefHtml += `<div class="pref-item"><strong>Pref ${order}:</strong> <span class="status-${h.status}">${h.status}</span> - ${h.reason}</div>`;
            }
            prefHtml += '</div>';

            return `<tr>
                <td>${p.sen}</td>
                <td style="width: 50%;"><strong>${p.name}</strong>${prefHtml}</td>
                <td>${p.orig.replace('-', ' ')}</td>
                <td style="color:${p.moved?'#3fb950':''}">${awarded}</td>
                <td>${p.moved?'AWARDED':'HELD'}</td>
                <td style="color:${isMatch?'#3fb950':'#f85149'}">${isMatch?'✓ Match':'✗ '+companyRaw}</td>
            </tr>`;
        }).join('');
    }
</script>
</body>
</html>
