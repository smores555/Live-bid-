<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>737 Master Bid Control - True Top-Down Displacement</title>
    
    <script src="engine.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #ffd33d; --purple: #bc8cff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .cap-cell { display: flex; flex-direction: column; font-size: 0.7rem; }
        .cap-cell input { background: #0d1117; border: 1px solid var(--border); color: #4ade80; padding: 5px; border-radius: 4px; font-weight: bold; }
        .toolbar { display: flex; align-items: center; gap: 10px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .dash-container { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .dash-box { background: #1a1d23; border: 1px solid var(--border); padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; }
        .dash-title { margin: 0 0 10px 0; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        .unassigned-item { background: #1b122a; border-left: 4px solid var(--purple); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; color: #eee; }
        .disp-item { background: #2a2612; border-left: 4px solid var(--yellow); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; color: #eee; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        th { background: #21262d; color: var(--accent); text-align: left; padding: 12px; font-size: 0.8rem; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: middle; }
        .award-reason { display: block; font-size: 0.7rem; color: #8b949e; margin-top: 4px; font-style: italic; }
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; margin-left: 5px; text-transform: uppercase; display: inline-block; }
        .tag-red { background: var(--red); color: white; }
        .tag-yellow { background: var(--yellow); color: #000; }
        .rank-badge { background: #30363d; padding: 3px 7px; border-radius: 4px; color: #4ade80; font-weight: bold; font-size: 0.85rem; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin:0">Position Deltas (737 Fleet)</h3>
        <div id="capGrid" class="cap-grid">Loading...</div>
    </div>

    <div class="dash-container">
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--accent)">⚙️ Engine Status</h4>
            <div id="statusBox" style="font-size: 0.75rem;">Idle.</div>
        </div>
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--yellow)">⚠️ MOVER Pilots</h4>
            <div id="displacedList">Ready...</div>
        </div>
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--purple)">🆘 DISPLACED</h4>
            <div id="unassignedList">Ready...</div>
        </div>
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--red)">🛑 BPL Failures</h4>
            <div id="selfDispList">Ready...</div>
        </div>
    </div>

    <div class="toolbar">
        <button id="runBtn" class="btn">RUN MASTER POSITION BID</button>
        <button id="expBase" class="btn">XLSX: BASE LIST</button>
        <button id="expMaster" class="btn">XLSX: MASTER AWARDS</button>
        <button id="expLog" class="btn">XLSX: TRANSITION LOG</button>
        <div style="flex-grow:1"></div>
        <input type="number" id="lookupInput" style="padding:10px; background:#0d1117; color:white; border:1px solid var(--border); border-radius:6px; width:120px;" placeholder="Sen #">
        <button id="lookupBtn" class="btn">LOOKUP</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Sen #</th>
                <th>Pilot Name</th>
                <th>From</th>
                <th>To</th>
                <th style="text-align:center">Pref #</th>
                <th>Status</th>
                <th>Notes</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
let store = { roster: [], prefs: {}, caps: [], retired: [], noBid: [] };
let lastResults = [];
let lastTargetMap = {};
let lastAuditTrail = [];

function exportToCSV(filename, rows) {
    const csvContent = rows.map(row => row.map(cell => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

window.onload = async () => {
    try {
        const files = ['roster.json', 'preferences.json', 'capacities.json', 'retired_pilots.json', 'nobidpilots.json'];
        const results = await Promise.all(files.map(async f => { const r = await fetch(f); return await r.json(); }));
        store = { roster: results[0], prefs: results[1], caps: results[2], retired: results[3], noBid: results[4] };
        renderCapacities();
    } catch (e) { document.body.innerHTML = `<div style="padding:40px; color:red">🚨 ERROR: ${e.message}</div>`; }
};

function renderCapacities() {
    document.getElementById('capGrid').innerHTML = store.caps.map(c => `<div class="cap-cell"><label>${c.base} ${c.seat} (Cap: ${c.startCapacity})</label><input type="number" id="delta-${c.base}-${c.seat}" value="${c.delta || 0}"></div>`).join('');
}

document.getElementById('runBtn').onclick = () => {
    const deltas = {};
    store.caps.forEach(c => { const el = document.getElementById(`delta-${c.base}-${c.seat}`); if (el) deltas[`${c.base}-${c.seat}`.toUpperCase()] = parseInt(el.value) || 0; });
    const result = runBidEngine(store, deltas);
    lastResults = result.roster;
    lastTargetMap = result.targetMap;
    lastAuditTrail = result.auditTrail;
    renderTable(lastResults, lastTargetMap, lastAuditTrail);
    renderDashboards(lastResults);
    document.getElementById('statusBox').innerHTML = `Run complete. Evaluated ${lastResults.length} active bidders. System ran ${result.loops} cascade loops to resolve seniority.`;
};

function renderDashboards(roster) {
    let unassignedHtml = '', moverHtml = '', selfDispHtml = '';
    roster.forEach(p => {
        const item = `<div class="${p.isUnassigned ? 'unassigned-item' : (p.wasSelfDisplaced ? 'self-disp-item' : 'disp-item')}">#${p.sen} ${p.name}: ${p.awardedReason}</div>`;
        if (p.isUnassigned) unassignedHtml += item;
        if (p.wasSelfDisplaced) selfDispHtml += item;
        if (p.moved && !p.isUnassigned) moverHtml += `<div class="disp-item">#${p.sen} ${p.name} from ${p.orig}</div>`;
    });
    document.getElementById('unassignedList').innerHTML = unassignedHtml || "None.";
    document.getElementById('selfDispList').innerHTML = selfDispHtml || "None.";
    document.getElementById('displacedList').innerHTML = moverHtml || "None.";
}

function renderTable(roster, targetMap, auditTrail) {
    function fmt(key) { return (key || '').replace(/-/g, ' '); }

    function reasonHtml(text) {
        const lines = (text || '').split('\n');
        return lines[0] + (lines[1] ? `<span class="award-reason">${lines[1]}</span>` : '');
    }

    function statusStyle(status) {
        if (status === 'Awarded') return 'color:#3fb950;font-weight:bold;';
        if (status === 'Reduction') return 'color:var(--yellow);font-weight:bold;';
        if (status === 'Denied') return 'color:var(--red);font-weight:bold;';
        if (status === 'Displaced' || status === 'BPL Fail') return 'color:var(--purple);font-weight:bold;';
        return '';
    }

    // Group audit trail by seniority number
    const auditBySen = {};
    auditTrail.forEach(entry => {
        if (!auditBySen[entry.sen]) auditBySen[entry.sen] = [];
        auditBySen[entry.sen].push(entry);
    });

    const html = roster.map(p => {
        const log          = p.moveLog;

        // ── Build rows grouped by cascade loop ──────────────────────────────

        // ── Build rows grouped by cascade loop ──────────────────────────────
        // Pattern per loop where reduction occurred:
        //   Reduction → Denied rows for that loop → [intermediate Awarded if held] → ...
        // Final loop: Reduction (if any) → Denied rows → final Awarded/Displaced

        const reductionEvents = p.reductionEvents || [];
        const failedPrefs     = p.failedPrefs || [];
        const auditEntries    = auditBySen[p.sen] || [];

        // Group failedPrefs by loop number
        const failedByLoop = {};
        failedPrefs.forEach(fp => {
            const l = fp.loop || 0;
            if (!failedByLoop[l]) failedByLoop[l] = [];
            failedByLoop[l].push(fp);
        });

        // Get the set of loops that had reductions
        const reductionByLoop = {};
        reductionEvents.forEach(re => { reductionByLoop[re.loop] = re; });

        // Build intermediate "held" audit rows (force-displaced pilot temporarily held)
        // These are non-final audit entries where forcedOut was true in prior loop
        const intermediateHolds = auditEntries.length > 1
            ? auditEntries.slice(0, -1).filter(e => e.log && e.log.forcedOut)
            : [];
        // Map them by loop
        const holdByLoop = {};
        intermediateHolds.forEach(e => { holdByLoop[e.loop] = e; });

        // Get all loops in order that had activity
        const allLoops = [...new Set([
            ...reductionEvents.map(r => r.loop),
            ...failedPrefs.map(fp => fp.loop || 0)
        ])].sort((a, b) => a - b);

        const rows = [];

        // If no reductions at all, just do denied rows then final awarded
        if (reductionEvents.length === 0) {
            failedPrefs.forEach(fp => {
                rows.push({
                    prefNum: fp.order,
                    fromPos: fmt(fp.fromKey) || '—',
                    toPos:   fp.targetKey ? ('737 ' + fmt(fp.targetKey)) : '737 —',
                    status:  'Denied',
                    reason:  fp.reason || ''
                });
            });
        } else {
            // Interleave: for each loop that had a reduction, show:
            // 1. Reduction row
            // 2. Denied rows for that loop
            // 3. Intermediate hold row (if they temporarily re-held)
            allLoops.forEach(loop => {
                const re   = reductionByLoop[loop];
                const fps  = failedByLoop[loop] || [];
                const hold = holdByLoop[loop];

                if (re) {
                    rows.push({
                        prefNum: 'X',
                        fromPos: fmt(re.fromKey) || '—',
                        toPos:   '737 ' + fmt(re.fromKey),
                        status:  'Reduction',
                        reason:  `Seniority is not high enough to hold position due to reductions. Minimum position seniority is ${re.minSen}.`
                    });
                }

                fps.forEach(fp => {
                    rows.push({
                        prefNum: fp.order,
                        fromPos: fmt(fp.fromKey) || '—',
                        toPos:   fp.targetKey ? ('737 ' + fmt(fp.targetKey)) : '737 —',
                        status:  'Denied',
                        reason:  fp.reason || ''
                    });
                });

                // Intermediate hold: they won a pref or held in this loop
                // but then got bumped again in the next loop
                if (hold) {
                    rows.push({
                        prefNum: hold.log ? (hold.log.prefOrder || '—') : '—',
                        fromPos: fmt(hold.from) || '—',
                        toPos:   hold.to ? ('737 ' + fmt(hold.to)) : '—',
                        status:  'Awarded',
                        reason:  hold.reason || 'Awarded — subsequently displaced by senior pilot.'
                    });
                }
            });

            // Any failed prefs from loops with no reduction (shouldn't normally happen, but guard)
            Object.keys(failedByLoop).forEach(loop => {
                if (!reductionByLoop[loop]) {
                    failedByLoop[loop].forEach(fp => {
                        rows.push({
                            prefNum: fp.order,
                            fromPos: fmt(fp.fromKey) || '—',
                            toPos:   fp.targetKey ? ('737 ' + fmt(fp.targetKey)) : '737 —',
                            status:  'Denied',
                            reason:  fp.reason || ''
                        });
                    });
                }
            });
        }

        // ── Final awarded / displaced row ────────────────────────────────────
        if (log) {
            const finalKey = p.currentKey;
            let prefNum, fromPos, toPos, status, reason;

            const lastAudit = auditEntries.length ? auditEntries[auditEntries.length - 1] : null;
            fromPos = fmt(lastAudit ? lastAudit.from : p.orig) || '—';

            if (finalKey === 'UNASSIGNED') {
                prefNum = '—';
                toPos   = 'UNASSIGNED';
                status  = p.wasSelfDisplaced ? 'BPL Fail' : 'Displaced';
                reason  = p.awardedReason;
            } else if (log.step === 'B') {
                prefNum = '—';
                toPos   = '737 ' + fmt(finalKey);
                status  = 'Awarded';
                reason  = 'Remain in current position.';
            } else if (log.step === 'A' && log.stayed) {
                prefNum = log.prefOrder;
                toPos   = '737 ' + fmt(finalKey);
                status  = 'Awarded';
                reason  = 'Remain in current position.';
            } else if (log.step === 'A' || log.step === 'C') {
                prefNum = log.prefOrder || '—';
                toPos   = '737 ' + fmt(log.toKey || finalKey);
                status  = 'Awarded';
                reason  = p.awardedReason;
            } else {
                prefNum = '—';
                toPos   = '737 ' + fmt(finalKey);
                status  = 'Awarded';
                reason  = p.awardedReason;
            }

            rows.push({ prefNum, fromPos, toPos, status, reason });
        } else {
            // No log at all — stayed put with no movement
            rows.push({
                prefNum: '—',
                fromPos: fmt(p.orig),
                toPos:   '737 ' + fmt(p.currentKey),
                status:  'Awarded',
                reason:  'Remain in current position.'
            });
        }

        // ── Render all rows for this pilot ───────────────────────────────────
        const isMover   = p.moved && !p.isUnassigned;
        const nameColor = isMover ? '#3fb950' : p.isUnassigned ? 'var(--purple)' : 'var(--text)';
        const moverTag  = isMover ? `<br><span class="tag tag-yellow">MOVER</span>` : 
                          p.wasSelfDisplaced ? `<br><span class="tag tag-red">BPL FAIL</span>` :
                          p.isUnassigned ? `<br><span class="tag" style="background:var(--purple);color:white;">DISPLACED</span>` : '';

        // Rank badge for final row: how many pilots at or senior to p are at that key
        function rankBadge(toKey) {
            if (!toKey || toKey === 'UNASSIGNED' || toKey === '—') return '';
            let r = 0;
            roster.forEach(other => { if (other.sen <= p.sen && other.currentKey === toKey) r++; });
            const cap = targetMap[toKey] || 0;
            return `<span class="rank-badge">${r} / ${cap}</span>`;
        }

        return rows.map((row, i) => {
            const isFirst = i === 0;
            const isLast  = i === rows.length - 1;

            const senCell  = isFirst
                ? `<td rowspan="${rows.length}" style="font-weight:bold;vertical-align:top;padding-top:14px;border-top:2px solid var(--accent);border-bottom:2px solid var(--accent);">${p.sen}</td>`
                : '';
            const nameCell = isFirst
                ? `<td rowspan="${rows.length}" style="vertical-align:top;padding-top:14px;border-top:2px solid var(--accent);border-bottom:2px solid var(--accent);"><strong style="color:${nameColor}">${p.name}</strong>${moverTag}</td>`
                : '';

            const tdStyle = `style="${isFirst ? 'border-top:2px solid var(--accent);' : ''}${isLast ? 'border-bottom:2px solid var(--accent);' : ''}"`;
            const tdStyleCenter = `style="${isFirst ? 'border-top:2px solid var(--accent);' : ''}${isLast ? 'border-bottom:2px solid var(--accent);' : ''}text-align:center;"`;
            const tdStyleStatus = `style="${isFirst ? 'border-top:2px solid var(--accent);' : ''}${isLast ? 'border-bottom:2px solid var(--accent);' : ''}${statusStyle(row.status)}"`;

            const rankCell = isLast ? rankBadge(p.currentKey) : '';

            return `<tr>
                ${senCell}${nameCell}
                <td ${tdStyle}>${row.fromPos}</td>
                <td ${tdStyle}>${row.toPos}</td>
                <td ${tdStyleCenter}>${row.prefNum}</td>
                <td ${tdStyleStatus}>${row.status}</td>
                <td ${tdStyle}>${rankCell}${rankCell ? ' ' : ''}${reasonHtml(row.reason)}</td>
            </tr>`;
        }).join('');
    }).join('');

    document.getElementById('tableBody').innerHTML = html;
}

document.getElementById('expMaster').onclick = () => {
    const wb = XLSX.utils.book_new();
    const ws = {};
    const HEADER_BG = '21262D';
    const ALT_BG    = '161B22';
    const WHITE     = 'FFFFFF';
    const GREY      = '8B949E';

    function hStyle() {
        return { fill: { fgColor: { rgb: HEADER_BG } }, font: { bold: true, color: { rgb: '58A6FF' }, name: 'Arial', sz: 10 }, alignment: { horizontal: 'left', vertical: 'center' } };
    }
    function dStyle(alt, muted) {
        return { fill: { fgColor: { rgb: alt ? ALT_BG : '0D1117' } }, font: { color: { rgb: muted ? GREY : WHITE }, name: 'Arial', sz: 10 }, alignment: { horizontal: 'left', vertical: 'center', wrapText: true } };
    }
    function setCell(r, c, v, style) {
        const addr = XLSX.utils.encode_cell({ r, c });
        ws[addr] = { v, t: typeof v === 'number' ? 'n' : 's', s: style };
    }

    const headers = ["Seniority", "Name", "Awarded Position", "Final Rank", "Award Path", "Original Position"];
    headers.forEach((h, c) => setCell(0, c, h, hStyle()));

    lastResults.forEach((p, i) => {
        const r = i + 1;
        const alt = i % 2 === 1;
        let finalRank = 0;
        if (p.currentKey !== "UNASSIGNED") lastResults.forEach(other => { if (other.sen <= p.sen && other.currentKey === p.currentKey) finalRank++; });
        const vals = [p.sen, p.name, p.currentKey.replace('-', ' '), finalRank || '', p.awardedReason, p.orig.replace('-', ' ')];
        vals.forEach((v, c) => setCell(r, c, v, dStyle(alt, c === 4)));
    });

    ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: lastResults.length, c: 5 } });
    ws['!cols'] = [{ wch: 8 }, { wch: 24 }, { wch: 14 }, { wch: 12 }, { wch: 80 }, { wch: 14 }];
    ws['!rows'] = [{ hpt: 18 }];

    XLSX.utils.book_append_sheet(wb, ws, 'Master Awards');
    XLSX.writeFile(wb, 'master_awards.xlsx', { cellStyles: true });
};

document.getElementById('expBase').onclick = () => {
    const bases = ['ANC', 'SEA', 'LAX', 'SAN', 'SFO', 'PDX'];
    const baseNames = { ANC: 'Anchorage', SEA: 'Seattle', LAX: 'Los Angeles', SAN: 'San Diego', SFO: 'San Francisco', PDX: 'Portland' };
    const wb = XLSX.utils.book_new();

    const GREEN_DARK  = '1A5E1A';
    const GREEN_LIGHT = 'D6F0DB';
    const BLUE_DARK   = '0D3D6B';
    const BLUE_LIGHT  = 'D0E4F7';
    const WHITE       = 'FFFFFF';

    function cellStyle(bgHex, bold, color) {
        return {
            fill: { fgColor: { rgb: bgHex } },
            font: { bold: !!bold, color: { rgb: color || WHITE }, name: 'Arial', sz: 10 },
            alignment: { horizontal: 'left', vertical: 'center' },
            border: {
                top:    { style: 'thin', color: { rgb: 'CCCCCC' } },
                bottom: { style: 'thin', color: { rgb: 'CCCCCC' } },
                left:   { style: 'thin', color: { rgb: 'CCCCCC' } },
                right:  { style: 'thin', color: { rgb: 'CCCCCC' } }
            }
        };
    }

    bases.forEach(base => {
        const caKey = `${base}-CA`;
        const foKey = `${base}-FO`;
        const caPilots = lastResults.filter(p => p.currentKey === caKey).sort((a, b) => a.sen - b.sen);
        const foPilots = lastResults.filter(p => p.currentKey === foKey).sort((a, b) => a.sen - b.sen);
        if (caPilots.length === 0 && foPilots.length === 0) return;

        const caCap   = lastTargetMap[caKey] || 0;
        const foCap   = lastTargetMap[foKey] || 0;
        const maxRows = Math.max(caPilots.length, foPilots.length);
        const ws      = {};
        const range   = { s: { r: 0, c: 0 }, e: { r: maxRows + 3, c: 7 } };

        function setCell(r, c, v, style) {
            const addr = XLSX.utils.encode_cell({ r, c });
            ws[addr] = { v, t: typeof v === 'number' ? 'n' : 's', s: style };
        }

        const bigGreen = { fill: { fgColor: { rgb: GREEN_DARK } }, font: { bold: true, color: { rgb: WHITE }, name: 'Arial', sz: 28 }, alignment: { horizontal: 'center', vertical: 'center' } };
        const bigBlue  = { fill: { fgColor: { rgb: BLUE_DARK  } }, font: { bold: true, color: { rgb: WHITE }, name: 'Arial', sz: 28 }, alignment: { horizontal: 'center', vertical: 'center' } };
        const fullName = (baseNames[base] || base).toUpperCase();

        [0,1,2,3].forEach(c => setCell(0, c, c === 0 ? fullName : '', bigGreen));
        [4,5,6,7].forEach(c => setCell(0, c, c === 4 ? fullName : '', bigBlue));

        const tG = cellStyle(GREEN_DARK, true, WHITE);
        const tB = cellStyle(BLUE_DARK,  true, WHITE);
        setCell(1, 0, `737 ${baseNames[base] || base}`, tG);
        [1,2,3].forEach(c => setCell(1, c, '', tG));
        setCell(1, 4, `737 ${baseNames[base] || base}`, tB);
        [5,6,7].forEach(c => setCell(1, c, '', tB));

        setCell(2, 0, 'BPL #',             cellStyle(GREEN_DARK, true));
        setCell(2, 1, 'CAPTAIN NAME',       cellStyle(GREEN_DARK, true));
        setCell(2, 2, 'SEN #',             cellStyle(GREEN_DARK, true));
        setCell(2, 3, String(caCap),        cellStyle(GREEN_DARK, true));
        setCell(2, 4, 'BPL #',             cellStyle(BLUE_DARK,  true));
        setCell(2, 5, 'FIRST OFFICER NAME', cellStyle(BLUE_DARK,  true));
        setCell(2, 6, 'SEN #',             cellStyle(BLUE_DARK,  true));
        setCell(2, 7, String(foCap),        cellStyle(BLUE_DARK,  true));

        for (let i = 0; i < maxRows; i++) {
            const r     = i + 3;
            const isAlt = i % 2 === 1;
            const caBg  = isAlt ? GREEN_LIGHT : WHITE;
            const foBg  = isAlt ? BLUE_LIGHT  : WHITE;
            const ca    = caPilots[i];
            const fo    = foPilots[i];
            setCell(r, 0, ca ? i + 1   : '', cellStyle(caBg, false, '1A3A1A'));
            setCell(r, 1, ca ? ca.name : '', cellStyle(caBg, false, '1A3A1A'));
            setCell(r, 2, ca ? ca.sen  : '', cellStyle(caBg, false, '1A3A1A'));
            setCell(r, 3, '',                cellStyle(caBg, false, '1A3A1A'));
            setCell(r, 4, fo ? i + 1   : '', cellStyle(foBg, false, '0D2A4A'));
            setCell(r, 5, fo ? fo.name : '', cellStyle(foBg, false, '0D2A4A'));
            setCell(r, 6, fo ? fo.sen  : '', cellStyle(foBg, false, '0D2A4A'));
            setCell(r, 7, '',                cellStyle(foBg, false, '0D2A4A'));
        }

        ws['!ref']  = XLSX.utils.encode_range(range);
        ws['!cols'] = [{ wch: 6 }, { wch: 28 }, { wch: 8 }, { wch: 6 }, { wch: 6 }, { wch: 28 }, { wch: 8 }, { wch: 6 }];
        ws['!rows'] = [{ hpt: 48 }, { hpt: 20 }, { hpt: 18 }];
        XLSX.utils.book_append_sheet(wb, ws, base);
    });

    XLSX.writeFile(wb, 'base_lists.xlsx', { cellStyles: true });
};

document.getElementById('expLog').onclick = () => {
    const wb = XLSX.utils.book_new();
    const ws = {};
    const HEADER_BG = '21262D';
    const WHITE     = 'FFFFFF';
    const GREY      = '8B949E';

    function hStyle() {
        return { fill: { fgColor: { rgb: HEADER_BG } }, font: { bold: true, color: { rgb: '58A6FF' }, name: 'Arial', sz: 10 }, alignment: { horizontal: 'left', vertical: 'center' } };
    }
    function dStyle(alt, muted) {
        return { fill: { fgColor: { rgb: alt ? '161B22' : '0D1117' } }, font: { color: { rgb: muted ? GREY : WHITE }, name: 'Arial', sz: 10 }, alignment: { horizontal: 'left', vertical: 'center', wrapText: true } };
    }
    function setCell(r, c, v, style) {
        const addr = XLSX.utils.encode_cell({ r, c });
        ws[addr] = { v, t: typeof v === 'number' ? 'n' : 's', s: style };
    }

    const headers = ["Seniority", "Name", "From", "To", "Transition Note"];
    headers.forEach((h, c) => setCell(0, c, h, hStyle()));

    const pilotMap = {};
    lastResults.forEach(p => { pilotMap[p.sen] = p; });

    lastAuditTrail.forEach((entry, i) => {
        const r   = i + 1;
        const alt = i % 2 === 1;
        const p   = pilotMap[entry.sen];
        const from = (entry.from || (p ? p.orig : '')).replace('-', ' ');
        const to   = (entry.to  || '').replace('-', ' ');
        const note = (entry.reason || '').replace('\n', ' ');
        const vals = [entry.sen, entry.name, from, to, note];
        vals.forEach((v, c) => setCell(r, c, v, dStyle(alt, c === 4)));
    });

    ws['!ref']  = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: lastAuditTrail.length, c: 4 } });
    ws['!cols'] = [{ wch: 8 }, { wch: 24 }, { wch: 14 }, { wch: 14 }, { wch: 90 }];
    XLSX.utils.book_append_sheet(wb, ws, 'Transition Log');
    XLSX.writeFile(wb, 'transition_log.xlsx', { cellStyles: true });
};
</script>
