<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid Control Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header-card">
        <h2>Airline Cascading Bid Engine</h2>
        <div id="capacityGrid" class="grid"></div>
    </div>

    <div class="actions">
        <button id="runBtn" class="btn-primary">RUN CASCADING BID</button>
        <input type="text" id="search" placeholder="Track Seniority #">
        <span id="status">Ready</span>
    </div>

    <div id="debugTrace" class="trace-box hidden"></div>

    <table id="results">
        <thead>
            <tr>
                <th>Sen #</th>
                <th>Name</th>
                <th>Original</th>
                <th>Awarded</th>
                <th>Validation</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>
</div>

<script src="engine.js"></script>
<script>
    let rawData = {};
    let answerKey = {};

    window.onload = async () => {
        // Load your JSON/CSV files here
        const files = ['roster.json.txt', 'preferences.json.txt', 'capacities.json.txt', 'retired_pilots.json.txt', 'nobidpilots.json.txt', 'answer_key.csv'];
        const res = await Promise.all(files.map(f => fetch(f)));
        
        rawData = {
            roster: await res[0].json(),
            prefs: await res[1].json(),
            caps: await res[2].json(),
            retired: await res[3].json(),
            noBid: await res[4].json()
        };

        // Parse Answer Key for validation
        const csv = await res[5].text();
        csv.split('\n').slice(1).forEach(line => {
            const cols = line.split(',');
            if(cols[0]) answerKey[cols[0]] = cols[2]?.replace(/"/g, '').trim();
        });

        renderCaps();
    };

    function renderCaps() {
        const container = document.getElementById('capacityGrid');
        container.innerHTML = rawData.caps.map((c, i) => `
            <div class="cap-item">
                <label>${c.base} ${c.seat}</label>
                <input type="number" id="cap-${c.base}-${c.seat}" value="${c.startCapacity + c.delta}">
            </div>
        `).join('');
    }

    document.getElementById('runBtn').onclick = () => {
        const trackSen = parseInt(document.getElementById('search').value);
        const caps = {};
        rawData.caps.forEach(c => {
            caps[`${c.base}-${c.seat}`] = parseInt(document.getElementById(`cap-${c.base}-${c.seat}`).value);
        });

        const result = runBidEngine(rawData, caps, trackSen);
        
        // Render Trace
        const traceBox = document.getElementById('debugTrace');
        if (trackSen && result.trace.length > 0) {
            traceBox.classList.remove('hidden');
            traceBox.innerHTML = `<h3>Trace for Sen #${trackSen}</h3>` + 
                result.trace.map(t => `<div class="t-${t.status}">${t.msg}</div>`).join('');
        }

        // Render Table
        document.getElementById('resultsBody').innerHTML = result.roster.map(p => {
            const awarded = p.currentKey.replace('-', ' ');
            const expected = answerKey[p.sen] || "N/A";
            const match = expected.includes(awarded);
            return `
                <tr>
                    <td>${p.sen}</td>
                    <td>${p.name}</td>
                    <td>${p.orig}</td>
                    <td class="${p.moved ? 'moved' : ''}">${awarded}</td>
                    <td class="${match ? 'match' : 'mismatch'}">${match ? '✓ Match' : '✗ ' + expected}</td>
                </tr>
            `;
        }).join('');
        
        document.getElementById('status').innerText = `Finished: ${result.loops} cascades`;
    };
</script>
</body>
</html>
