<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>737 Master Bid Control - BPL Strict</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #ffd33d; --purple: #bc8cff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .cap-cell { display: flex; flex-direction: column; font-size: 0.7rem; }
        .cap-cell input { background: #0d1117; border: 1px solid var(--border); color: #4ade80; padding: 5px; border-radius: 4px; font-weight: bold; }
        .toolbar { display: flex; align-items: center; gap: 10px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        
        .dash-container { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .dash-box { background: #1a1d23; border: 1px solid var(--border); padding: 15px; border-radius: 8px; height: 300px; overflow-y: auto; }
        .dash-title { margin: 0 0 10px 0; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; }
        
        .unassigned-item { background: #1b122a; border-left: 4px solid var(--purple); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; color: #eee; }
        .self-disp-item { background: #2a1212; border-left: 4px solid var(--red); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; color: #eee; }
        .disp-item { background: #2a2612; border-left: 4px solid var(--yellow); padding: 8px; margin-bottom: 8px; font-size: 0.75rem; color: #eee; }
        
        .audit-log { background: #0d1117; border: 1px solid var(--accent); border-radius: 8px; padding: 15px; font-family: monospace; font-size: 0.75rem; max-height: 200px; overflow-y: auto; margin-bottom: 20px; color: #8b949e; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        th { background: #21262d; color: var(--accent); text-align: left; padding: 12px; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: top; }
        
        .tag { padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; margin-left: 5px; text-transform: uppercase; display: inline-block; }
        .tag-red { background: var(--red); color: white; }
        .tag-yellow { background: var(--yellow); color: #000; }
        .rank-badge { background: #30363d; padding: 3px 7px; border-radius: 4px; color: #4ade80; font-weight: bold; font-size: 0.85rem; border: 1px solid #444; }
        .award-reason { display: block; font-size: 0.7rem; color: #8b949e; margin-top: 4px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3 style="margin:0">Position Deltas (737 Fleet)</h3>
        <div id="capGrid" class="cap-grid">Loading...</div>
    </div>

    <div class="dash-container">
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--red)">🛑 Self-Displaced (BPL Fail)</h4>
            <div id="selfDispList">Ready...</div>
        </div>
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--yellow)">⚠️ All Displaced Pilots</h4>
            <div id="displacedList">Ready...</div>
        </div>
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--purple)">🆘 Pool: At Mercy</h4>
            <div id="unassignedList">Ready...</div>
        </div>
        <div class="dash-box">
            <h4 class="dash-title" style="color:var(--accent)">⚙️ Engine Status</h4>
            <div id="statusBox" style="font-size: 0.75rem;">Idle.</div>
        </div>
    </div>

    <div class="toolbar">
        <button id="runBtn" class="btn">RUN MASTER POSITION BID</button>
        <button id="expBase" class="btn btn-export" style="margin-left:10px;">CSV: BASE LIST</button>
        <button id="expMaster" class="btn btn-export">CSV: MASTER AWARDS</button>
        <button id="expLog" class="btn btn-export">CSV: TRANSITION LOG</button>
        <div style="flex-grow:1"></div>
        <input type="number" id="lookupInput" style="padding:10px; background:#0d1117; color:white; border:1px solid var(--border); border-radius:6px; width:120px;" placeholder="Sen #">
        <button id="lookupBtn" class="btn">LOOKUP</button>
    </div>

    <div id="auditLog" class="audit-log">Audit trail...</div>

    <table>
        <thead>
            <tr>
                <th>Sen #</th>
                <th>Pilot Name</th>
                <th>Awarded Position</th>
                <th>Final Standing (Rank / Limit)</th>
                <th>Award Path</th>
                <th>Original Position</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
let store = { roster: [], prefs: {}, caps: [], retired: [], noBid: [] };
let lastResults = [];

function runBidEngine(data, deltaMap) {
    const is737 = (seat) => seat && !seat.includes('320') && !seat.includes('321');

    // 1. Initialize Dynamic Targets
    let targetMap = {};
    data.caps.forEach(c => {
        const key = `${c.base}-${c.seat}`.toUpperCase();
        targetMap[key] = c.startCapacity + (deltaMap[`${c.base}-${c.seat}`] || 0);
    });

    const retiredSens = new Set(data.retired.filter(p => is737(p.seat)).map(p => p.seniority));
    const noBidSens = new Set(data.noBid.filter(p => is737(p.seat)).map(p => p.sen));

    // Core arrays for tracking mathematically and visually
    let currentCounts = {};
    let displayVacancies = {};
    
    Object.keys(targetMap).forEach(k => {
        currentCounts[k] = 0; // Governs true capacity
        displayVacancies[k] = targetMap[k]; // Governs the log visual
    });

    const bidders = data.roster
        .filter(p => is737(p.current.seat) && !retiredSens.has(p.sen) && !noBidSens.has(p.sen))
        .map(p => {
            const prefData = data.prefs['pil' + p.sen] || data.prefs[p.id] || { preferences: [] };
            const pilotOrig = `${p.current.base}-${p.current.seat}`.toUpperCase();
            
            const getTargetKey = (bidStr) => {
                const parts = bidStr.trim().toUpperCase().split(/\s+/);
                const bases = ['SEA', 'PDX', 'ANC', 'SFO', 'LAX', 'SAN', 'LAS'];
                const seats = ['CA', 'FO'];
                let b = parts.find(x => bases.includes(x));
                let s = parts.find(x => seats.includes(x));
                return (b && s) ? `${b}-${s}` : null;
            };

            return {
                ...p,
                orig: pilotOrig,
                currentKey: "UNASSIGNED",
                moved: false, wasSelfDisplaced: false, isUnassigned: false,
                awardedPrefNum: "N/A", awardedReason: "",
                prefs: (prefData.preferences || []).map(pr => ({
                    ...pr, 
                    targetKey: getTargetKey(pr.bid),
                    bpl: parseInt(pr.bpl || pr.bpl_min) || 9999
                })).sort((a, b) => a.order - b.order)
            };
        })
        .sort((a, b) => a.sen - b.sen);

    bidders.forEach(p => {
        let awarded = false;

        // Step A: Bid Preferences
        for (const pr of p.prefs) {
            if (!pr.targetKey) continue;
            let currentOcc = currentCounts[pr.targetKey];
            let cap = targetMap[pr.targetKey] || 0;

            if (currentOcc < cap && (currentOcc + 1) <= pr.bpl) {
                p.currentKey = pr.targetKey;
                currentCounts[pr.targetKey]++;
                p.awardedPrefNum = pr.order;
                
                if (p.orig === pr.targetKey) {
                    let oldDisplay = displayVacancies[p.orig];
                    displayVacancies[p.orig]--;
                    let newDisplay = displayVacancies[p.orig];
                    p.awardedReason = `Remain in current position. Vacancy reduced from ${oldDisplay} to ${newDisplay}.`;
                } else {
                    // PILOT BIDS OUT: Calculate the Net Zero Swap
                    let oldTargetDisplay = displayVacancies[pr.targetKey];
                    displayVacancies[pr.targetKey]--;
                    let newTargetDisplay = displayVacancies[pr.targetKey];
                    
                    let oldOrigDisplay = displayVacancies[p.orig];
                    displayVacancies[p.orig]++; // Adds the seat back to the original base pool
                    let newOrigDisplay = displayVacancies[p.orig];
                    
                    p.awardedReason = `Open position available. Reduce vacancy in ${pr.targetKey} from ${oldTargetDisplay} to ${newTargetDisplay}. Increase vacancy in ${p.orig} from ${oldOrigDisplay} to ${newOrigDisplay}.`;
                }
                
                p.moved = (pr.targetKey !== p.orig);
                awarded = true;
                break;
            }
        }

        // Step B: Net Zero Seniority Hold
        if (!awarded) {
            const selfBidOnOwnSeat = p.prefs.find(pr => pr.targetKey === p.orig);
            const bplFail = selfBidOnOwnSeat && (currentCounts[p.orig] + 1 > selfBidOnOwnSeat.bpl);
            let currentOcc = currentCounts[p.orig];
            let cap = targetMap[p.orig] || 0;

            if (currentOcc < cap && !bplFail) {
                p.currentKey = p.orig;
                currentCounts[p.orig]++;
                
                let oldDisplay = displayVacancies[p.orig];
                displayVacancies[p.orig]--;
                let newDisplay = displayVacancies[p.orig];

                p.awardedReason = `Held Position (Seniority). Vacancy reduced from ${oldDisplay} to ${newDisplay}.`;
                awarded = true;
                p.moved = false;
            }
        }

        // Step C: Pool / Displacement
        if (!awarded) {
            p.currentKey = "UNASSIGNED";
            p.isUnassigned = true;
            p.moved = true;
            const selfBidOnOwnSeat = p.prefs.find(pr => pr.targetKey === p.orig);
            p.wasSelfDisplaced = !!(selfBidOnOwnSeat && (currentCounts[p.orig] + 1 > selfBidOnOwnSeat.bpl));
            p.awardedReason = p.wasSelfDisplaced ? "BPL Rank Constraint Failed" : `Displaced: No vacancy available in ${p.orig}.`;
            p.awardedPrefNum = "Pool";
        }
    });

    console.group("Debug: Net Zero Results");
    console.table(Object.keys(targetMap).map(key => ({
        Position: key,
        Target: targetMap[key],
        FinalCount: currentCounts[key],
        RemainingVacancy: targetMap[key] - currentCounts[key]
    })));
    console.groupEnd();

    return { roster: bidders, targetMap };
}

window.onload = async () => {
    try {
        const files = ['roster.json', 'preferences.json', 'capacities.json', 'retired_pilots.json', 'nobidpilots.json'];
        const results = await Promise.all(files.map(async f => { const r = await fetch(f); return await r.json(); }));
        store = { roster: results[0], prefs: results[1], caps: results[2], retired: results[3], noBid: results[4] };
        renderCapacities();
    } catch (e) { document.body.innerHTML = `<div style="padding:40px; color:red">🚨 ERROR: ${e.message}</div>`; }
};

function renderCapacities() {
    document.getElementById('capGrid').innerHTML = store.caps.map(c => `
        <div class="cap-cell">
            <label>${c.base} ${c.seat} (Cap: ${c.startCapacity})</label>
            <input type="number" id="delta-${c.base}-${c.seat}" value="${c.delta}">
        </div>`).join('');
}

document.getElementById('runBtn').onclick = () => {
    const deltas = {};
    store.caps.forEach(c => deltas[`${c.base}-${c.seat}`] = parseInt(document.getElementById(`delta-${c.base}-${c.seat}`).value) || 0);
    const result = runBidEngine(store, deltas);
    lastResults = result.roster;
    renderTable(lastResults, result.targetMap);
    renderDashboards(lastResults);
};

function renderDashboards(roster) {
    let unassignedHtml = ''; let selfDispHtml = ''; let allDispHtml = '';
    roster.forEach(p => {
        const item = `<div class="${p.wasSelfDisplaced ? 'self-disp-item' : (p.isUnassigned ? 'unassigned-item' : 'disp-item')}">#${p.sen} ${p.name}: ${p.awardedReason}</div>`;
        if (p.wasSelfDisplaced) selfDispHtml += item;
        if (p.isUnassigned) unassignedHtml += item;
        if (p.moved) allDispHtml += `<div class="disp-item">#${p.sen} ${p.name} from ${p.orig}</div>`;
    });
    document.getElementById('selfDispList').innerHTML = selfDispHtml || "None.";
    document.getElementById('unassignedList').innerHTML = unassignedHtml || "None.";
    document.getElementById('displacedList').innerHTML = allDispHtml || "None.";
}

function renderTable(roster, targetMap) {
    document.getElementById('tableBody').innerHTML = roster.map(p => {
        const awardedPos = p.currentKey.replace('-', ' ');
        let tags = '';
        if (p.wasSelfDisplaced) tags += '<span class="tag tag-red">SELF-DISPLACED</span>';
        if (p.moved) tags += '<span class="tag tag-yellow">DISPLACED</span>';
        if (p.isUnassigned) tags += '<span class="tag" style="background:var(--purple); color:white;">POOL</span>';

        let finalRank = 0;
        if (p.currentKey !== "UNASSIGNED") {
            roster.forEach(other => { if (other.sen <= p.sen && other.currentKey === p.currentKey) finalRank++; });
        }
        const limit = targetMap[p.currentKey] || 0;

        return `
            <tr>
                <td>${p.sen}</td>
                <td><strong>${p.name}</strong><br>${tags}</td>
                <td style="color:${p.moved?'#3fb950':''}">${awardedPos}</td>
                <td><span class="rank-badge">${p.currentKey === "UNASSIGNED" ? "-" : finalRank + " / " + limit}</span></td>
                <td>
                    <span class="award-detail">${p.awardedPrefNum === "N/A" ? "Original" : "Pref #" + p.awardedPrefNum}</span>
                    <span class="award-reason">${p.awardedReason}</span>
                </td>
                <td>${p.orig.replace('-',' ')}</td>
            </tr>`;
    }).join('');
}
</script>
</body>
</html>
